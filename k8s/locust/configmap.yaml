apiVersion: v1
kind: ConfigMap
metadata:
  name: locust-script
  namespace: puresecure
  labels:
    app: locust
data:
  locustfile.py: |
    """
    Locust load-testing scenarios for CWE Explorer API.

    Run via the Locust web UI at http://localhost:8089
    Target host is pre-configured to http://web:8000 in Kubernetes.

    Authenticates using the SERVICE_API_KEY environment variable.
    """

    import os
    import random
    from locust import HttpUser, task, between, tag


    # Service API key for authenticating with the API
    SERVICE_API_KEY = os.environ.get("SERVICE_API_KEY", "")

    # Sample CWE IDs known to exist in the MITRE dataset
    SAMPLE_CWE_IDS = [
        "79", "89", "20", "78", "119", "200", "264", "352",
        "287", "310", "362", "399", "400", "416", "476",
        "502", "611", "787", "798", "918",
    ]

    SEARCH_TERMS = [
        "injection", "buffer", "overflow", "authentication",
        "cross-site", "memory", "privilege", "path traversal",
        "cryptographic", "deserialization", "race condition",
        "input validation", "command", "upload", "disclosure",
    ]


    class CWEExplorerUser(HttpUser):
        """Simulates a developer browsing the CWE Explorer API."""

        wait_time = between(1, 3)

        def on_start(self):
            """Set auth headers once when the simulated user starts."""
            if SERVICE_API_KEY:
                self.client.headers.update({
                    "Authorization": f"Bearer {SERVICE_API_KEY}"
                })

        # -- CWE Endpoints --

        @tag("cwe", "list")
        @task(5)
        def list_cwes(self):
            """GET /api/cwe -- list CWEs (default, no query)."""
            limit = random.choice([5, 10, 25, 50])
            self.client.get(f"/api/cwe?limit={limit}", name="/api/cwe")

        @tag("cwe", "search")
        @task(4)
        def search_cwes(self):
            """GET /api/cwe?query=... -- keyword search."""
            term = random.choice(SEARCH_TERMS)
            self.client.get(
                f"/api/cwe?query={term}&limit=10",
                name="/api/cwe?query=[term]",
            )

        @tag("cwe", "detail")
        @task(3)
        def get_cwe_detail(self):
            """GET /api/cwe/{id} -- single CWE lookup."""
            cwe_id = random.choice(SAMPLE_CWE_IDS)
            self.client.get(
                f"/api/cwe/{cwe_id}",
                name="/api/cwe/[id]",
            )

        @tag("cwe", "suggestions")
        @task(3)
        def get_suggestions(self):
            """GET /api/cwe/suggestions?q=... -- autocomplete."""
            q = random.choice(SEARCH_TERMS)[:4]
            self.client.get(
                f"/api/cwe/suggestions?q={q}",
                name="/api/cwe/suggestions",
            )

        @tag("cwe", "cves")
        @task(2)
        def get_cwe_cves(self):
            """GET /api/cwe/{id}/cves -- CVEs for a CWE."""
            cwe_id = random.choice(SAMPLE_CWE_IDS)
            self.client.get(
                f"/api/cwe/{cwe_id}/cves",
                name="/api/cwe/[id]/cves",
            )

        # -- Analytics Endpoints --

        @tag("analytics")
        @task(2)
        def top_cwes(self):
            """GET /api/analytics/top-cwes."""
            self.client.get(
                "/api/analytics/top-cwes?limit=10",
                name="/api/analytics/top-cwes",
            )

        @tag("analytics")
        @task(1)
        def cwe_risk_scores(self):
            """GET /api/analytics/cwe-risk."""
            self.client.get(
                "/api/analytics/cwe-risk?limit=15",
                name="/api/analytics/cwe-risk",
            )

        # -- Static / Health --

        @tag("health")
        @task(1)
        def health_check(self):
            """GET /api/health -- public health endpoint."""
            self.client.get("/api/health", name="/api/health")
