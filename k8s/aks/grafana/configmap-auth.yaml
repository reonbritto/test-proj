# Grafana Azure AD (Microsoft Entra ID) OAuth configuration.
# This lets users sign in to Grafana with the same Microsoft account
# they use for the main PureSecure app.
#
# IMPORTANT: You must register a redirect URI in your Azure AD app:
#   https://grafana.reondev.top/login/azuread
#
# And you must create a client secret in Azure AD and add it to app-secrets:
#   kubectl create secret generic app-secrets ... --from-literal=GF_AZURE_CLIENT_SECRET="your-secret"
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-auth-config
  namespace: puresecure
  labels:
    app: grafana
data:
  # ── Server ─────────────────────────────────────────────
  GF_SERVER_ROOT_URL: "https://grafana.reondev.top"
  GF_SERVER_DOMAIN: "grafana.reondev.top"
  # ── Users ──────────────────────────────────────────────
  GF_USERS_ALLOW_SIGN_UP: "true"
  GF_USERS_AUTO_ASSIGN_ORG: "true"
  GF_USERS_AUTO_ASSIGN_ORG_ROLE: "Viewer"
  # ── Azure AD OAuth ────────────────────────────────────
  GF_AUTH_AZUREAD_ENABLED: "true"
  GF_AUTH_AZUREAD_NAME: "Microsoft"
  GF_AUTH_AZUREAD_ALLOW_SIGN_UP: "true"
  GF_AUTH_AZUREAD_AUTO_LOGIN: "false"
  GF_AUTH_AZUREAD_SCOPES: "openid profile email User.Read"
  # Set this to your Azure AD app registration client ID
  GF_AUTH_AZUREAD_CLIENT_ID: "your-client-id-here"
  GF_AUTH_AZUREAD_AUTH_URL: "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
  GF_AUTH_AZUREAD_TOKEN_URL: "https://login.microsoftonline.com/common/oauth2/v2.0/token"
  # ── Disable default login form (Microsoft only) ───────
  GF_AUTH_DISABLE_LOGIN_FORM: "false"
