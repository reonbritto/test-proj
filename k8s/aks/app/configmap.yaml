apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: puresecure
  labels:
    app: cwe-explorer
data:
  PYTHONUNBUFFERED: "1"
  # Set these to your Azure Entra ID app registration values
  AZURE_TENANT_ID: "your-tenant-id-here"
  AZURE_CLIENT_ID: "your-client-id-here"
  CORS_ORIGINS: "https://reondev.top,http://localhost:8000,http://127.0.0.1:8000"
  GRAFANA_URL: "https://grafana.reondev.top"
  PROMETHEUS_URL: ""
  LOCUST_URL: ""
