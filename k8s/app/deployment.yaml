apiVersion: apps/v1
kind: Deployment
metadata:
  name: cwe-explorer
  namespace: puresecure
  labels:
    app: cwe-explorer
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cwe-explorer
  template:
    metadata:
      labels:
        app: cwe-explorer
        tier: backend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: cwe-explorer
          image: reonbritto/puresecure-cve-explorer:latest
          # Docker Desktop with local image: imagePullPolicy: Never
          # AKS with ACR: image: <acr>.azurecr.io/puresecure-cve-explorer:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: cwe-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: cwe-data
          persistentVolumeClaim:
            claimName: cwe-data-pvc
