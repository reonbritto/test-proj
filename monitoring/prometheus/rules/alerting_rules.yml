groups:
  # ─────────────────────────────────────────────────────────
  #  Availability & Error Alerts
  # ─────────────────────────────────────────────────────────
  - name: cwe_explorer_alerts
    rules:
      # 🔴 API is completely down — no successful responses for 2 minutes
      - alert: APIDown
        expr: up{job="cwe-explorer"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CWE Explorer API is DOWN"
          description: "Prometheus cannot reach the /metrics endpoint on web:8000. The API has been unreachable for more than 2 minutes."

      # 🔴 High 5xx error rate — more than 5% of requests are failing
      - alert: HighServerErrorRate
        expr: cwe:http_error_ratio_5xx > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Server error rate above 5%"
          description: "{{ $value | humanizePercentage }} of requests are returning 5xx errors over the last 5 minutes."

      # 🟡 Elevated 4xx error rate — more than 25% of requests are client errors
      - alert: HighClientErrorRate
        expr: cwe:http_error_ratio_4xx > 0.25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Client error rate above 25%"
          description: "{{ $value | humanizePercentage }} of requests are returning 4xx errors. Could indicate broken clients or missing resources."

      # 🔴 Availability below 99%
      - alert: LowAvailability
        expr: cwe:http_availability:5m < 0.99
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API availability below 99%"
          description: "Current availability is {{ $value | humanizePercentage }} over the last 5 minutes."

  # ─────────────────────────────────────────────────────────
  #  Latency Alerts
  # ─────────────────────────────────────────────────────────
  - name: cwe_explorer_latency_alerts
    rules:
      # 🟡 p95 latency exceeds 1 second
      - alert: HighP95Latency
        expr: cwe:http_latency_p95:5m > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency above 1 second"
          description: "95th percentile response time is {{ $value | humanizeDuration }}. Users are experiencing slow responses."

      # 🔴 p95 latency exceeds 5 seconds — something very wrong
      - alert: CriticalP95Latency
        expr: cwe:http_latency_p95:5m > 5.0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "p95 latency above 5 seconds"
          description: "95th percentile response time is {{ $value | humanizeDuration }}. The API is critically slow."

      # 🟡 p99 latency exceeds 3 seconds — tail latency issues
      - alert: HighP99Latency
        expr: cwe:http_latency_p99:5m > 3.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency above 3 seconds"
          description: "99th percentile response time is {{ $value | humanizeDuration }}. Some requests are hitting extreme latency."

      # 🟡 Specific endpoint is slow (p95 > 2s for any individual endpoint)
      - alert: SlowEndpoint
        expr: cwe:http_latency_p95_by_endpoint:5m > 2.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Endpoint {{ $labels.endpoint }} is slow"
          description: "p95 latency for {{ $labels.endpoint }} is {{ $value | humanizeDuration }}."

  # ─────────────────────────────────────────────────────────
  #  Traffic & Load Alerts
  # ─────────────────────────────────────────────────────────
  - name: cwe_explorer_traffic_alerts
    rules:
      # 🟡 No traffic at all — API might be broken or unused
      - alert: NoTraffic
        expr: cwe:http_requests:rate1m == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No requests received for 10 minutes"
          description: "The API has not received any requests in the last 10 minutes. It may be unreachable or unused."

      # 🟡 High number of concurrent requests — approaching overload
      - alert: HighConcurrency
        expr: cwe:http_in_progress:total > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High number of concurrent requests ({{ $value }})"
          description: "There are {{ $value }} requests currently being processed. The API may be overloaded."

      # 🔴 Traffic spike — rate jumped by 10x in the last 5 minutes
      - alert: TrafficSpike
        expr: >
          cwe:http_requests:rate1m
          > 10 * avg_over_time(cwe:http_requests:rate1m[1h])
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Traffic spike detected (10x normal)"
          description: "Current request rate is {{ $value | humanize }} req/s, which is 10x higher than the 1-hour average. Possible DDoS or runaway client."

  # ─────────────────────────────────────────────────────────
  #  Node Resource Alerts
  # ─────────────────────────────────────────────────────────
  - name: infra_node_alerts
    rules:
      # 🟡 Node CPU sustained above 80%
      - alert: NodeHighCPU
        expr: infra:node_cpu_usage:percent5m > 80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.instance }} CPU above 80%"
          description: "CPU usage on {{ $labels.instance }} is {{ $value | humanize }}% and has been elevated for over 10 minutes."

      # 🔴 Node CPU sustained above 90%
      - alert: NodeCriticalCPU
        expr: infra:node_cpu_usage:percent5m > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} CPU critically high ({{ $value | humanize }}%)"
          description: "CPU on {{ $labels.instance }} has been above 90% for 5 minutes. Workloads may be throttled."

      # 🟡 Node memory above 85%
      - alert: NodeHighMemory
        expr: infra:node_memory_usage:percent > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.instance }} memory above 85%"
          description: "Memory usage on {{ $labels.instance }} is {{ $value | humanize }}%. OOMKill risk is elevated."

      # 🔴 Node memory above 95%
      - alert: NodeCriticalMemory
        expr: infra:node_memory_usage:percent > 95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} memory critically high ({{ $value | humanize }}%)"
          description: "Memory on {{ $labels.instance }} is nearly exhausted. Pod evictions or OOMKills are imminent."

      # 🟡 Disk usage above 75%
      - alert: NodeDiskSpaceWarning
        expr: infra:node_disk_usage:percent > 75
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Node {{ $labels.instance }} disk above 75%"
          description: "Root filesystem on {{ $labels.instance }} is {{ $value | humanize }}% full."

      # 🔴 Disk usage above 90%
      - alert: NodeDiskSpaceCritical
        expr: infra:node_disk_usage:percent > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} disk critically full ({{ $value | humanize }}%)"
          description: "Root filesystem on {{ $labels.instance }} is nearly full. Pods may fail to write logs or data."

      # 🔴 node-exporter target is down
      - alert: NodeExporterDown
        expr: up{job="node-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "node-exporter on {{ $labels.instance }} is unreachable"
          description: "Prometheus cannot scrape node-exporter on {{ $labels.instance }}. Node metrics are unavailable."

  # ─────────────────────────────────────────────────────────
  #  Kubernetes Pod Alerts
  # ─────────────────────────────────────────────────────────
  - name: infra_kubernetes_alerts
    rules:
      # 🟡 Any pod is not Running or Succeeded
      - alert: PodNotRunning
        expr: >
          kube_pod_status_phase{namespace="puresecure",phase!="Running",phase!="Succeeded",job="kube-state-metrics"} == 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.pod }} is {{ $labels.phase }}"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been in {{ $labels.phase }} state for more than 5 minutes."

      # 🔴 Pod in Failed state
      - alert: PodFailed
        expr: kube_pod_status_phase{namespace="puresecure",phase="Failed",job="kube-state-metrics"} == 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} has Failed"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is in Failed state. Investigate with: kubectl describe pod {{ $labels.pod }} -n {{ $labels.namespace }}"

      # 🟡 Container restarted more than 3 times in 1 hour
      - alert: ContainerFrequentRestarts
        expr: infra:container_restarts:rate1h > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.container }} in {{ $labels.pod }} restarting frequently"
          description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted {{ $value | humanize }} times in the last hour. Check logs: kubectl logs {{ $labels.pod }} -c {{ $labels.container }} -n puresecure"

      # 🔴 kube-state-metrics target is down
      - alert: KubeStateMetricsDown
        expr: up{job="kube-state-metrics"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "kube-state-metrics is unreachable"
          description: "Prometheus cannot scrape kube-state-metrics. Kubernetes object health metrics are unavailable."

  # ─────────────────────────────────────────────────────────
  #  Redis Alerts
  # ─────────────────────────────────────────────────────────
  - name: infra_redis_alerts
    rules:
      # 🔴 Redis is down
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is unreachable"
          description: "Prometheus cannot scrape the Redis exporter. The cache is down — the API will fail to enforce concurrent user limits and CVE caching is disabled."

      # 🟡 Redis memory above 80% of maxmemory
      - alert: RedisHighMemory
        expr: infra:redis_memory_usage:ratio > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory above 80% of maxmemory"
          description: "Redis is using {{ $value | humanizePercentage }} of its 128 MiB limit. LRU eviction will begin soon."

      # 🔴 Redis memory above 95% — active eviction happening
      - alert: RedisCriticalMemory
        expr: infra:redis_memory_usage:ratio > 0.95
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Redis memory critically high ({{ $value | humanizePercentage }} of max)"
          description: "Redis is actively evicting cached CVE data due to memory pressure. Increase maxmemory or reduce TTLs."

      # 🟡 Cache hit rate below 80%
      - alert: RedisLowHitRate
        expr: infra:redis_hit_rate:5m < 0.80
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Redis cache hit rate below 80%"
          description: "Cache hit rate is {{ $value | humanizePercentage }} over the last 5 minutes. Many requests are bypassing the cache."

      # 🔴 LRU evictions occurring (any eviction rate > 0)
      - alert: RedisEvicting
        expr: infra:redis_evictions:rate5m > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Redis is evicting keys due to memory pressure"
          description: "Redis is evicting {{ $value | humanize }} keys/s. Cached CVE data is being lost. Increase the memory limit."
