groups:
  # ─────────────────────────────────────────────────────────
  #  Request Rate Queries
  #  Pre-compute request rates so dashboards load instantly
  # ─────────────────────────────────────────────────────────
  - name: cwe_explorer_request_rates
    interval: 15s
    rules:
      # Total requests per second (all endpoints combined)
      - record: cwe:http_requests:rate1m
        expr: sum(rate(http_requests_total{job="cwe-explorer"}[1m]))

      # Requests per second broken down by endpoint
      - record: cwe:http_requests_by_endpoint:rate1m
        expr: sum by (endpoint) (rate(http_requests_total{job="cwe-explorer"}[1m]))

      # Requests per second broken down by status code
      - record: cwe:http_requests_by_status:rate1m
        expr: sum by (status) (rate(http_requests_total{job="cwe-explorer"}[1m]))

      # Requests per second for each method + endpoint + status
      - record: cwe:http_requests_detailed:rate5m
        expr: sum by (method, endpoint, status) (rate(http_requests_total{job="cwe-explorer"}[5m]))

  # ─────────────────────────────────────────────────────────
  #  Error Rate Queries
  #  Track how many requests are failing
  # ─────────────────────────────────────────────────────────
  - name: cwe_explorer_error_rates
    interval: 15s
    rules:
      # 5xx error rate (errors per second)
      - record: cwe:http_errors_5xx:rate1m
        expr: sum(rate(http_requests_total{job="cwe-explorer", status=~"5.."}[1m]))

      # 4xx client error rate
      - record: cwe:http_errors_4xx:rate1m
        expr: sum(rate(http_requests_total{job="cwe-explorer", status=~"4.."}[1m]))

      # Error ratio: what percentage of requests are 5xx?
      - record: cwe:http_error_ratio_5xx
        expr: >
          sum(rate(http_requests_total{job="cwe-explorer", status=~"5.."}[5m]))
          /
          sum(rate(http_requests_total{job="cwe-explorer"}[5m]))

      # Error ratio: what percentage of requests are 4xx?
      - record: cwe:http_error_ratio_4xx
        expr: >
          sum(rate(http_requests_total{job="cwe-explorer", status=~"4.."}[5m]))
          /
          sum(rate(http_requests_total{job="cwe-explorer"}[5m]))

  # ─────────────────────────────────────────────────────────
  #  Latency Queries
  #  Pre-compute percentiles for fast dashboard rendering
  # ─────────────────────────────────────────────────────────
  - name: cwe_explorer_latency
    interval: 15s
    rules:
      # p50 (median) response time — "typical" request
      - record: cwe:http_latency_p50:5m
        expr: >
          histogram_quantile(0.50,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="cwe-explorer"}[5m]))
          )

      # p90 response time — "most" requests finish within this
      - record: cwe:http_latency_p90:5m
        expr: >
          histogram_quantile(0.90,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="cwe-explorer"}[5m]))
          )

      # p95 response time — SLO boundary
      - record: cwe:http_latency_p95:5m
        expr: >
          histogram_quantile(0.95,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="cwe-explorer"}[5m]))
          )

      # p99 response time — worst-case tail latency
      - record: cwe:http_latency_p99:5m
        expr: >
          histogram_quantile(0.99,
            sum by (le) (rate(http_request_duration_seconds_bucket{job="cwe-explorer"}[5m]))
          )

      # p95 latency per endpoint — find the slowest routes
      - record: cwe:http_latency_p95_by_endpoint:5m
        expr: >
          histogram_quantile(0.95,
            sum by (le, endpoint) (rate(http_request_duration_seconds_bucket{job="cwe-explorer"}[5m]))
          )

      # Average response time per endpoint
      - record: cwe:http_avg_duration_by_endpoint:5m
        expr: >
          sum by (endpoint) (rate(http_request_duration_seconds_sum{job="cwe-explorer"}[5m]))
          /
          sum by (endpoint) (rate(http_request_duration_seconds_count{job="cwe-explorer"}[5m]))

  # ─────────────────────────────────────────────────────────
  #  Throughput & Availability
  # ─────────────────────────────────────────────────────────
  - name: cwe_explorer_availability
    interval: 15s
    rules:
      # Availability: percentage of non-5xx responses
      - record: cwe:http_availability:5m
        expr: >
          1 - (
            sum(rate(http_requests_total{job="cwe-explorer", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="cwe-explorer"}[5m]))
          )

      # Current requests in flight (total across all endpoints)
      - record: cwe:http_in_progress:total
        expr: sum(http_requests_in_progress{job="cwe-explorer"})

      # In-progress by endpoint
      - record: cwe:http_in_progress_by_endpoint
        expr: sum by (endpoint) (http_requests_in_progress{job="cwe-explorer"})

      # Total requests served since startup
      - record: cwe:http_requests:total
        expr: sum(http_requests_total{job="cwe-explorer"})

      # Total requests per endpoint since startup
      - record: cwe:http_requests_by_endpoint:total
        expr: sum by (endpoint) (http_requests_total{job="cwe-explorer"})
