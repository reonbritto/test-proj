global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Send fired alerts to Alertmanager
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# Load recording rules and alerting rules
rule_files:
  - /etc/prometheus/rules/recording_rules.yml
  - /etc/prometheus/rules/alerting_rules.yml

scrape_configs:
  - job_name: "cwe-explorer"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"]
        labels:
          app: "cwe-explorer"
          environment: "development"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "alertmanager"
    static_configs:
      - targets: ["alertmanager:9093"]

  # Node-level OS metrics (CPU, memory, disk, network)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          environment: "development"

  # Kubernetes object metrics (pod status, resource requests/limits, restarts)
  - job_name: "kube-state-metrics"
    static_configs:
      - targets: ["kube-state-metrics:8080"]
        labels:
          environment: "development"

  # Redis cache metrics (memory, ops/s, hit rate, keyspace)
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          environment: "development"
