global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load recording rules and alerting rules
rule_files:
  - /etc/prometheus/rules/recording_rules.yml
  - /etc/prometheus/rules/alerting_rules.yml

scrape_configs:
  - job_name: "cwe-explorer"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"]
        labels:
          app: "cwe-explorer"
          environment: "development"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
