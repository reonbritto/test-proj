apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: puresecure
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: puresecure
  source:
    repoURL: https://github.com/reonbritto/cwe-explorer.git
    targetRevision: main
    path: helm/puresecure
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: puresecure
  # Ignore fields the ExternalSecrets controller defaults server-side.
  # Without this, ArgoCD reports OutOfSync because nullBytePolicy is added
  # to every remoteRef even though we don't set it in the chart.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /spec/data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
