# ─────────────────────────────────────────────────────────
#  Telemetry — per-namespace tracing config
#
#  Tells every sidecar in the puresecure namespace to:
#    1. Send spans to Zipkin in istio-system
#    2. Sample at the configured percentage
#  Lives at the namespace level so it overrides whatever
#  default the IstioOperator was installed with.
# ─────────────────────────────────────────────────────────
apiVersion: telemetry.istio.io/v1
kind: Telemetry
metadata:
  name: tracing-default
  namespace: {{ .Values.global.appNamespace }}
spec:
  tracing:
    # Both provider names below must already be registered on the
    # IstioOperator meshConfig (re-run istioctl install with both
    # extensionProviders flags — see docs/openobserve-setup.md).
    - providers:
        - name: zipkin
        - name: openobserve
      randomSamplingPercentage: {{ .Values.mesh.tracingSamplingPercent }}
