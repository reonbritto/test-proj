# Values for ExternalDNS Helm Chart (kubernetes-sigs/external-dns)
# Usage: helm upgrade --install external-dns external-dns/external-dns \
#          -n external-dns --create-namespace -f helm/external-dns-values.yaml

provider:
  name: azure

# Azure credentials via Workload Identity (azure.json mounted as a secret volume)
secretConfiguration:
  enabled: true
  mountPath: "/etc/kubernetes"
  data:
    azure.json: |
      {
        "tenantId": "d1d16433-e375-4076-a7ea-c57bb79df0de",
        "subscriptionId": "dfed6615-05cd-434d-b0e0-7dea9e050738",
        "resourceGroup": "sa",
        "useWorkloadIdentityExtension": true
      }

# The Client ID of the User-Assigned Managed Identity with "DNS Zone Contributor" role
env:
  - name: AZURE_CLIENT_ID
    value: "cd42e120-cd9e-4b78-87e3-ee719c07c23c"

serviceAccount:
  create: true
  name: external-dns-sa
  annotations:
    azure.workload.identity/client-id: "cd42e120-cd9e-4b78-87e3-ee719c07c23c"

podLabels:
  azure.workload.identity/use: "true"

# Watch the Traefik Service (type LoadBalancer) to discover the external IP,
# then create DNS records for any Service/Ingress annotated with external-dns.
# We do NOT use traefik-proxy source because it requires manually annotating
# each IngressRoute with the LB IP. Instead we annotate the Traefik Service
# itself and use the service source — ExternalDNS will create records for all
# hostnames listed in external-dns.alpha.kubernetes.io/hostname on that Service.
sources:
  - service
  - ingress

# Restrict to only manage records under reondev.top
domainFilters:
  - reondev.top

# A unique owner ID so ExternalDNS knows which TXT records it owns
txtOwnerId: "puresecure-aks"

# RBAC — allows ExternalDNS to read Services across all namespaces
rbac:
  create: true

# Watch all namespaces
namespaced: false
