# ─────────────────────────────────────────────────────────
#  PureSecure CWE Explorer — Helm Chart Values
# ─────────────────────────────────────────────────────────

# -- Global
namespace: puresecure
domain: reondev.top
# ─────────────────────────────────────────────────────────
#  Application (FastAPI)
# ─────────────────────────────────────────────────────────
app:
  name: cwe-explorer
  image:
    repository: reonbritto/puresecure-cwe-explorer
    tag: "cc4494f" # CI will auto-update this with the git SHA
    pullPolicy: Always
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  probes:
    liveness:
      path: /api/health
      initialDelaySeconds: 30
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 5
    readiness:
      path: /api/health
      initialDelaySeconds: 20
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 5
  storage:
    size: 2Gi
    storageClass: managed-csi
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    fsGroup: 1000
  config:
    PYTHONUNBUFFERED: "1"
    CORS_ORIGINS: "https://reondev.top"
    REDIS_URL: "redis://redis:6379/0"
    MAX_CONCURRENT_USERS: "3"
    USER_SESSION_TTL: "1800"
    GRAFANA_URL: "https://grafana.reondev.top"
    ARGOCD_URL: "https://argocd.reondev.top"
    PROMETHEUS_URL: "http://prometheus:9090"
    LOCUST_URL: "http://locust:8089"
    ALERTMANAGER_URL: "http://alertmanager:9093"
# ─────────────────────────────────────────────────────────
#  Redis (Cache + Concurrent User Tracking)
# ─────────────────────────────────────────────────────────
redis:
  enabled: true
  image: redis:7-alpine
  replicas: 1
  port: 6379
  maxmemory: "128mb"
  maxmemoryPolicy: "allkeys-lru"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 192Mi
# ─────────────────────────────────────────────────────────
#  Redis Exporter (exposes Redis metrics to Prometheus)
# ─────────────────────────────────────────────────────────
redisExporter:
  enabled: true
  image: oliver006/redis_exporter:v1.61.0
  port: 9121
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
# ─────────────────────────────────────────────────────────
#  Node Exporter (OS-level metrics: CPU, memory, disk, network)
# ─────────────────────────────────────────────────────────
nodeExporter:
  enabled: true
  image: prom/node-exporter:v1.8.0
  port: 9100
  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
# ─────────────────────────────────────────────────────────
#  Kube State Metrics (Kubernetes object metrics)
# ─────────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true
  image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.12.0
  port: 8080
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
# ─────────────────────────────────────────────────────────
#  Prometheus
# ─────────────────────────────────────────────────────────
prometheus:
  enabled: true
  image: prom/prometheus:v2.51.2
  initImage: busybox:1.36
  replicas: 1
  port: 9090
  retention: 15d
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  storage:
    size: 5Gi
    storageClass: managed-csi
  securityContext:
    fsGroup: 65534
# ─────────────────────────────────────────────────────────
#  Grafana
# ─────────────────────────────────────────────────────────
grafana:
  enabled: true
  image: grafana/grafana:10.4.2
  initImage: busybox:1.36
  replicas: 1
  port: 3000
  adminUser: admin
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  storage:
    size: 2Gi
    storageClass: managed-csi
  securityContext:
    fsGroup: 472
  auth:
    azuread:
      enabled: "true"
      name: "Microsoft"
      allowSignUp: "true"
      autoLogin: "false"
      scopes: "openid profile email User.Read"
      # clientId is pulled from Azure Key Vault via ExternalSecrets (AZURE_CLIENT_ID)
      authUrl: "https://login.microsoftonline.com/common/oauth2/v2.0/authorize"
      tokenUrl: "https://login.microsoftonline.com/common/oauth2/v2.0/token"
    disableLoginForm: "false"
    usersAllowSignUp: "false"
    usersAutoAssignOrg: "true"
    usersAutoAssignOrgRole: "Viewer"
    serverRootUrl: "https://grafana.reondev.top"
    serverDomain: "grafana.reondev.top"
# ─────────────────────────────────────────────────────────
#  Locust (Load Testing)
# ─────────────────────────────────────────────────────────
locust:
  enabled: true
  image: locustio/locust:2.24.1
  replicas: 1
  port: 8089
  targetHost: "http://web:8000"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
# ─────────────────────────────────────────────────────────
#  Alertmanager
# ─────────────────────────────────────────────────────────
alertmanager:
  enabled: true
  image: prom/alertmanager:v0.28.1
  replicas: 1
  port: 9093
  externalUrl: "alertmanager.reondev.top" # used in --web.external-url (optional, for click-through links)
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  smtp:
    # Gmail SMTP relay — username and password are injected from Key Vault via ESO
    # and read by Alertmanager via smtp_auth_username_file / smtp_auth_password_file.
    # smtp_from must match the Gmail sender address (no _file variant exists for this field).
    host: "smtp.gmail.com:587"
    from: "PureSecure Alerts <reonbritto@gmail.com>"
    requireTLS: true
    alertRecipient: "reon@duck.com"
# ─────────────────────────────────────────────────────────
#  Traefik IngressRoute
# ─────────────────────────────────────────────────────────
ingress:
  hosts:
    app: reondev.top
    grafana: grafana.reondev.top
  tlsSecretName: reondev-top-tls
  rateLimit:
    average: 100
    burst: 200
    period: 1m
# ─────────────────────────────────────────────────────────
#  cert-manager
# ─────────────────────────────────────────────────────────
certManager:
  email: reon@duck.com
  issuer:
    prod:
      name: letsencrypt-prod
      server: https://acme-v02.api.letsencrypt.org/directory
    staging:
      name: letsencrypt-staging
      server: https://acme-staging-v02.api.letsencrypt.org/directory
# ─────────────────────────────────────────────────────────
#  Azure Key Vault — External Secrets Operator
# ─────────────────────────────────────────────────────────
externalSecrets:
  enabled: true
  keyVaultName: kv-puresecure-prod
  tenantId: "d1d16433-e375-4076-a7ea-c57bb79df0de" # Azure tenant for Key Vault access (required by SecretStore)
  managedIdentityClientId: "e44f0ca6-60a2-4852-85b7-6ba1a5d00342" # Set to the Azure Managed Identity Client ID
  secretStoreName: azure-keyvault
  refreshInterval: 1h
  # Secrets written into the "app-secrets" Kubernetes Secret
  secrets:
    - kubeSecretKey: SERVICE_API_KEY
      remoteRef: service-api-key
    - kubeSecretKey: AZURE_TENANT_ID
      remoteRef: azure-tenant-id
    - kubeSecretKey: AZURE_CLIENT_ID
      remoteRef: azure-client-id
    - kubeSecretKey: GF_ADMIN_PASSWORD
      remoteRef: gf-admin-password
    - kubeSecretKey: GF_AUTH_AZUREAD_CLIENT_SECRET
      remoteRef: gf-auth-azuread-client-secret
  # Secrets written into the "alertmanager-smtp-secret" Kubernetes Secret
  alertmanagerSecrets:
    - kubeSecretKey: ALERTMANAGER_SMTP_USERNAME
      remoteRef: alertmanager-smtp-username
    - kubeSecretKey: ALERTMANAGER_SMTP_PASSWORD
      remoteRef: alertmanager-smtp-password
