{{- if .Values.promtail.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.promtail.labels" . | nindent 4 }}
data:
  promtail.yaml: |
    server:
      http_listen_port: {{ .Values.promtail.port }}

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki:{{ .Values.loki.port }}/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/*/**/*.log
        pipeline_stages:
          - cri: {}
          - regex:
              source: filename
              expression: /var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/.*
          - labels:
              namespace:
              pod:
              container:
{{- end }}
