{{- if .Values.promtail.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.promtail.labels" . | nindent 4 }}
data:
  promtail.yaml: |
    server:
      http_listen_port: {{ .Values.promtail.port }}

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      # Primary (and only): Loki.
      # OpenObserve v0.13 doesn't expose a working Promtail-compatible
      # endpoint at this build — neither /api/<org>/loki/... nor
      # /api/<org>/_loki/... nor /loki/... return 200. To ship logs to
      # OpenObserve, deploy Fluent Bit (or Vector) as a separate
      # DaemonSet and configure OTLP HTTP output → OO at
      #   /api/<org>/v1/logs
      # Tracked as a follow-up in docs/openobserve-setup.md.
      - url: http://loki:{{ .Values.loki.port }}/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/*/**/*.log
        pipeline_stages:
          - cri: {}
          - regex:
              source: filename
              expression: /var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/.*
          - labels:
              namespace:
              pod:
              container:
{{- end }}
