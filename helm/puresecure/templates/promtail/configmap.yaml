{{- if .Values.promtail.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.promtail.labels" . | nindent 4 }}
data:
  promtail.yaml: |
    server:
      http_listen_port: {{ .Values.promtail.port }}

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      # Primary: Loki (existing)
      - url: http://loki:{{ .Values.loki.port }}/loki/api/v1/push
      # Additive: OpenObserve. It speaks the Loki push API under
      # /api/<organization>/loki/api/v1/push and accepts basic-auth
      # with the same credentials you use to log into the UI.
      # The org name "puresecure" matches openobserve.organization in
      # helm/openobserve/values.yaml.
      - url: http://openobserve.openobserve.svc.cluster.local:5080/api/puresecure/loki/api/v1/push
        basic_auth:
          username: admin@reondev.top
          password: ChangeMe123!

    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/*/**/*.log
        pipeline_stages:
          - cri: {}
          - regex:
              source: filename
              expression: /var/log/pods/(?P<namespace>[^_]+)_(?P<pod>[^_]+)_[^/]+/(?P<container>[^/]+)/.*
          - labels:
              namespace:
              pod:
              container:
{{- end }}
