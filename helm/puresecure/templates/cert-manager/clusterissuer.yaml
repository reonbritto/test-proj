apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuer.prod.name }}
spec:
  acme:
    server: {{ .Values.certManager.issuer.prod.server }}
    email: {{ .Values.certManager.email }}
    privateKeySecretRef:
      name: {{ .Values.certManager.issuer.prod.name }}-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.certManager.issuer.staging.name }}
spec:
  acme:
    server: {{ .Values.certManager.issuer.staging.server }}
    email: {{ .Values.certManager.email }}
    privateKeySecretRef:
      name: {{ .Values.certManager.issuer.staging.name }}-key
    solvers:
      - http01:
          ingress:
            ingressClassName: traefik
