apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.ingress.tlsSecretName }}
  namespace: {{ .Values.namespace }}
spec:
  secretName: {{ .Values.ingress.tlsSecretName }}
  issuerRef:
    name: {{ .Values.certManager.issuer.prod.name }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.ingress.hosts.app }}
    - {{ .Values.ingress.hosts.grafana }}
    {{- with .Values.ingress.hosts.kiali }}
    - {{ . }}
    {{- end }}
