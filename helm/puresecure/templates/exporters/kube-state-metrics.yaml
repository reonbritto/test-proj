{{- if .Values.kubeStateMetrics.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.kubeStateMetrics.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics-{{ .Values.namespace }}
  labels:
    {{- include "puresecure.kubeStateMetrics.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - resourcequotas
      - replicationcontrollers
      - limitranges
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - endpoints
    verbs: ["list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - statefulsets
      - daemonsets
      - deployments
      - replicasets
    verbs: ["list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - cronjobs
      - jobs
    verbs: ["list", "watch"]
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs: ["list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics-{{ .Values.namespace }}
  labels:
    {{- include "puresecure.kubeStateMetrics.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-state-metrics-{{ .Values.namespace }}
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: {{ .Values.namespace }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.kubeStateMetrics.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "puresecure.kubeStateMetrics.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "puresecure.kubeStateMetrics.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: kube-state-metrics
      automountServiceAccountToken: true
      containers:
        - name: kube-state-metrics
          image: {{ .Values.kubeStateMetrics.image }}
          ports:
            - name: http-metrics
              containerPort: {{ .Values.kubeStateMetrics.port }}
              protocol: TCP
            - name: telemetry
              containerPort: 8081
              protocol: TCP
          resources:
            requests:
              cpu: {{ .Values.kubeStateMetrics.resources.requests.cpu }}
              memory: {{ .Values.kubeStateMetrics.resources.requests.memory }}
            limits:
              cpu: {{ .Values.kubeStateMetrics.resources.limits.cpu }}
              memory: {{ .Values.kubeStateMetrics.resources.limits.memory }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.kubeStateMetrics.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.kubeStateMetrics.port }}
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.kubeStateMetrics.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.kubeStateMetrics.port }}
      targetPort: http-metrics
      protocol: TCP
      name: http-metrics
    - port: 8081
      targetPort: telemetry
      protocol: TCP
      name: telemetry
  selector:
    {{- include "puresecure.kubeStateMetrics.selectorLabels" . | nindent 4 }}
{{- end }}
