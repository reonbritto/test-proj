            {"title": "Redis Operations Per Second", "description": "Commands processed per second.", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 82}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "rate(redis_commands_processed_total{job=\"redis\"}[1m])", "legendFormat": "ops/s", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "ops", "color": {"fixedColor": "#73BF69", "mode": "fixed"}, "custom": {"lineWidth": 2, "fillOpacity": 20}}, "overrides": []}, "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}}},
            {"title": "Redis Cache Hit Rate", "description": "Hit ratio. Below 90% means the cache is not effective.", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 90}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "rate(redis_keyspace_hits_total{job=\"redis\"}[5m]) / (rate(redis_keyspace_hits_total{job=\"redis\"}[5m]) + rate(redis_keyspace_misses_total{job=\"redis\"}[5m]))", "legendFormat": "Hit Rate", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "percentunit", "min": 0, "max": 1, "color": {"mode": "thresholds"}, "custom": {"lineWidth": 2, "fillOpacity": 20}, "thresholds": {"steps": [{"color": "#F2495C", "value": null}, {"color": "#FF9830", "value": 0.8}, {"color": "#73BF69", "value": 0.9}]}}, "overrides": []}, "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "last"]}}},
            {"title": "Redis Keyspace \u2014 Keys Stored", "description": "Total keys in Redis.", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 90}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "sum(redis_db_keys{job=\"redis\"})", "legendFormat": "Keys", "refId": "A"}, {"expr": "sum(redis_db_keys_expiring{job=\"redis\"})", "legendFormat": "Expiring Keys", "refId": "B"}], "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2, "fillOpacity": 10}}, "overrides": []}, "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["last"]}}},
            {"title": "Redis Evicted & Expired Keys", "description": "LRU evictions vs TTL expirations.", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 98}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "rate(redis_evicted_keys_total{job=\"redis\"}[5m])", "legendFormat": "Evicted/s (LRU)", "refId": "A"}, {"expr": "rate(redis_expired_keys_total{job=\"redis\"}[5m])", "legendFormat": "Expired/s (TTL)", "refId": "B"}], "fieldConfig": {"defaults": {"unit": "ops", "color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2, "fillOpacity": 15}}, "overrides": [{"matcher": {"id": "byName", "options": "Evicted/s (LRU)"}, "properties": [{"id": "color", "value": {"fixedColor": "#F2495C", "mode": "fixed"}}]}]}, "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}}},
            {"title": "Redis Uptime", "description": "Time since Redis last restarted.", "type": "stat", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 98}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "redis_uptime_in_seconds{job=\"redis\"}", "legendFormat": "Uptime", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "s", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "#F2495C", "value": null}, {"color": "#FF9830", "value": 300}, {"color": "#73BF69", "value": 3600}]}}, "overrides": []}, "options": {"colorMode": "background", "graphMode": "area", "textMode": "value_and_name"}},
            {"title": "", "type": "text", "gridPos": {"h": 2, "w": 24, "x": 0, "y": 106}, "options": {"mode": "markdown", "content": "# Prometheus & Alertmanager Health"}},
            {"title": "Prometheus TSDB Head Samples", "description": "Active time-series samples in TSDB head block.", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 0, "y": 108}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "prometheus_tsdb_head_samples_appended_total{job=\"prometheus\"}", "legendFormat": "Samples appended", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2, "fillOpacity": 10}}, "overrides": []}, "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["last"]}}},
            {"title": "Prometheus Scrape Duration", "description": "Time taken to scrape each target.", "type": "timeseries", "gridPos": {"h": 8, "w": 12, "x": 12, "y": 108}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "scrape_duration_seconds", "legendFormat": "{{ "{{" }}job{{ "}}" }}", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "s", "color": {"mode": "palette-classic"}, "custom": {"lineWidth": 2, "fillOpacity": 10}}, "overrides": []}, "options": {"legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}}},
            {"title": "Alertmanager \u2014 Alerts Firing", "description": "Alerts currently firing.", "type": "stat", "gridPos": {"h": 6, "w": 8, "x": 0, "y": 116}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "sum(alertmanager_alerts{state=\"active\",job=\"alertmanager\"})", "legendFormat": "Firing", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "#73BF69", "value": null}, {"color": "#FF9830", "value": 1}, {"color": "#F2495C", "value": 5}]}}, "overrides": []}, "options": {"colorMode": "background", "graphMode": "none", "textMode": "value_and_name"}},
            {"title": "Alertmanager \u2014 Notifications Sent", "description": "Total notifications dispatched in the last hour.", "type": "stat", "gridPos": {"h": 6, "w": 8, "x": 8, "y": 116}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "sum(increase(alertmanager_notifications_total{job=\"alertmanager\"}[1h]))", "legendFormat": "Sent (1h)", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "#73BF69", "value": null}, {"color": "#FF9830", "value": 10}, {"color": "#F2495C", "value": 50}]}}, "overrides": []}, "options": {"colorMode": "background", "graphMode": "area", "textMode": "value_and_name"}},
            {"title": "Alertmanager \u2014 Failed Notifications", "description": "Notifications that failed to deliver.", "type": "stat", "gridPos": {"h": 6, "w": 8, "x": 16, "y": 116}, "datasource": {"type": "prometheus", "uid": "prometheus"}, "targets": [{"expr": "sum(increase(alertmanager_notifications_failed_total{job=\"alertmanager\"}[1h]))", "legendFormat": "Failed (1h)", "refId": "A"}], "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"color": "#73BF69", "value": null}, {"color": "#F2495C", "value": 1}]}}, "overrides": []}, "options": {"colorMode": "background", "graphMode": "none", "textMode": "value_and_name"}}
        ],
        "schemaVersion": 39,
        "tags": ["infrastructure", "kubernetes", "redis", "node-exporter", "cluster"],
        "templating": {"list": [{"name": "namespace", "type": "query", "datasource": {"type": "prometheus", "uid": "prometheus"}, "query": "label_values(kube_pod_status_phase{job=\"kube-state-metrics\"}, namespace)", "current": {"text": "All", "value": "$__all"}, "refresh": 2, "includeAll": true, "multi": true, "sort": 1, "allValue": ".*"}]},
        "time": {"from": "now-1h", "to": "now"},
        "refresh": "30s",
        "timepicker": {"refresh_intervals": ["10s", "30s", "1m", "5m", "15m"]},
        "title": "PureSecure \u2014 Infrastructure Monitoring",
        "uid": "puresecure-infra",
        "version": 1
    }
  {{- if .Values.loki.enabled }}
  logs.json: |
    {
        "annotations": {"list": []},
        "editable": true,
        "fiscalYearStartMonth": 0,
        "graphTooltip": 1,
        "links": [],
        "panels": [
            {
                "title": "Log Volume",
                "type": "timeseries",
                "gridPos": {"h": 6, "w": 24, "x": 0, "y": 0},
                "datasource": {"type": "loki", "uid": "loki"},
                "targets": [
                    {
                        "expr": "sum(count_over_time({job=~\".+\"} [1m])) by (job)",
                        "legendFormat": "{{ "{{" }}job{{ "}}" }}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "custom": {
                            "drawStyle": "bars",
                            "stacking": {"mode": "normal"},
                            "fillOpacity": 50
                        },
                        "unit": "short"
                    }
                },
                "options": {"tooltip": {"mode": "multi"}}
            },
            {
                "title": "Application Logs",
                "type": "logs",
                "gridPos": {"h": 16, "w": 24, "x": 0, "y": 6},
                "datasource": {"type": "loki", "uid": "loki"},
                "targets": [
                    {
                        "expr": "{job=~\"${job:regex}\"}",
                        "refId": "A"
                    }
                ],
                "options": {
                    "showTime": true,
                    "showLabels": true,
                    "showCommonLabels": false,
                    "wrapLogMessage": true,
                    "prettifyLogMessage": false,
                    "enableLogDetails": true,
                    "sortOrder": "Descending",
                    "dedupStrategy": "none"
                }
            },
            {
                "title": "Auth Logs (User Logins)",
                "type": "logs",
                "gridPos": {"h": 10, "w": 24, "x": 0, "y": 22},
                "datasource": {"type": "loki", "uid": "loki"},
                "targets": [
                    {
                        "expr": "{container=\"cwe-explorer\"} |= \"AUTH user login\"",
                        "refId": "A"
                    }
                ],
                "options": {
                    "showTime": true,
                    "showLabels": true,
                    "wrapLogMessage": true,
                    "enableLogDetails": true,
                    "sortOrder": "Descending"
                }
            },
            {
                "title": "Error Logs",
                "type": "logs",
                "gridPos": {"h": 10, "w": 24, "x": 0, "y": 32},
                "datasource": {"type": "loki", "uid": "loki"},
                "targets": [
                    {
                        "expr": "{job=~\".+\"} |~ \"(?i)(error|exception|traceback|critical)\"",
                        "refId": "A"
                    }
                ],
                "options": {
                    "showTime": true,
                    "showLabels": true,
                    "wrapLogMessage": true,
                    "enableLogDetails": true,
                    "sortOrder": "Descending"
                }
            }
        ],
        "templating": {
            "list": [
                {
                    "name": "job",
                    "type": "query",
                    "datasource": {"type": "loki", "uid": "loki"},
                    "query": "label_values(job)",
                    "current": {"text": "All", "value": "$__all"},
                    "refresh": 2,
                    "includeAll": true,
                    "multi": true,
                    "sort": 1
                }
            ]
        },
        "time": {"from": "now-1h", "to": "now"},
        "refresh": "30s",
        "timepicker": {"refresh_intervals": ["10s", "30s", "1m", "5m", "15m"]},
        "title": "PureSecure \u2014 Logs",
        "uid": "puresecure-logs",
        "version": 1
    }
  {{- end }}
{{- end }}
