{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.grafana.labels" . | nindent 4 }}
data:
  cwe-explorer.json: |
    {
        "annotations": {
            "list": []
        },
        "editable": true,
        "fiscalYearStartMonth": 0,
        "graphTooltip": 1,
        "links": [],
        "panels": [
            {
                "title": "",
                "type": "text",
                "gridPos": {
                    "h": 2,
                    "w": 24,
                    "x": 0,
                    "y": 0
                },
                "options": {
                    "mode": "markdown",
                    "content": "# 📊 Overview"
                }
            },
            {
                "title": "Signed In As",
                "description": "The currently authenticated Grafana user viewing this dashboard.",
                "type": "text",
                "gridPos": {"h": 2, "w": 8, "x": 0, "y": 2},
                "options": {
                    "mode": "markdown",
                    "content": "👤 **${__user.login}** &nbsp;·&nbsp; ${__user.email}"
                }
            },
            {
                "title": "Dashboard",
                "type": "text",
                "gridPos": {"h": 2, "w": 8, "x": 8, "y": 2},
                "options": {
                    "mode": "markdown",
                    "content": "📋 **CWE Explorer — API Monitoring** &nbsp;·&nbsp; Auto-refresh: ${__dashboard.refresh}"
                }
            },
            {
                "title": "Time Range",
                "type": "text",
                "gridPos": {"h": 2, "w": 8, "x": 16, "y": 2},
                "options": {
                    "mode": "markdown",
                    "content": "🕒 **${__from:date:YYYY-MM-DD HH:mm}** → **${__to:date:HH:mm}**"
                }
            },
            {
                "title": "Total Requests Served",
                "description": "The total number of HTTP requests the API has handled since it started.",
                "type": "stat",
                "gridPos": {
                    "h": 5,
                    "w": 6,
                    "x": 0,
                    "y": 4
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum(http_requests_total{job=\"cwe-explorer\"})",
                        "legendFormat": "Total",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "thresholds"
                        },
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "#73BF69",
                                    "value": null
                                }
                            ]
                        },
                        "unit": "short"
                    },
                    "overrides": []
                },
                "options": {
                    "colorMode": "background",
                    "graphMode": "area",
                    "textMode": "value_and_name"
                }
            },
            {
                "title": "Successful Requests (2xx)",
                "description": "Total requests that returned a 2xx success status code.",
                "type": "stat",
                "gridPos": {
                    "h": 5,
                    "w": 6,
                    "x": 6,
                    "y": 4
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum(http_requests_total{job=\"cwe-explorer\", status=~\"2..\"})",
                        "legendFormat": "2xx",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "thresholds"
                        },
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "#73BF69",
                                    "value": null
                                }
                            ]
                        },
                        "unit": "short"
                    },
                    "overrides": []
                },
                "options": {
                    "colorMode": "background",
                    "graphMode": "area",
                    "textMode": "value_and_name"
                }
            },
            {
                "title": "Client Errors (4xx)",
                "description": "Requests that returned 4xx (bad request, not found, etc).",
                "type": "stat",
                "gridPos": {
                    "h": 5,
                    "w": 6,
                    "x": 12,
                    "y": 4
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum(http_requests_total{job=\"cwe-explorer\", status=~\"4..\"}) or vector(0)",
                        "legendFormat": "4xx",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "thresholds"
                        },
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "#FF9830",
                                    "value": null
                                }
                            ]
                        },
                        "unit": "short"
                    },
                    "overrides": []
                },
                "options": {
                    "colorMode": "background",
                    "graphMode": "area",
                    "textMode": "value_and_name"
                }
            },
            {
                "title": "Server Errors (5xx)",
                "description": "Requests that returned 5xx — these indicate bugs or failures in the API.",
                "type": "stat",
                "gridPos": {
                    "h": 5,
                    "w": 6,
                    "x": 18,
                    "y": 4
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum(http_requests_total{job=\"cwe-explorer\", status=~\"5..\"}) or vector(0)",
                        "legendFormat": "5xx",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "thresholds"
                        },
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "#F2495C",
                                    "value": null
                                }
                            ]
                        },
                        "unit": "short"
                    },
                    "overrides": []
                },
                "options": {
                    "colorMode": "background",
                    "graphMode": "area",
                    "textMode": "value_and_name"
                }
            },
            {
                "title": "",
                "type": "text",
                "gridPos": {
                    "h": 2,
                    "w": 24,
                    "x": 0,
                    "y": 9
                },
                "options": {
                    "mode": "markdown",
                    "content": "# 🚦 Traffic"
                }
            },
            {
                "title": "Requests Per Second",
                "description": "How many requests the API is handling per second, broken down by endpoint and status code.",
                "type": "timeseries",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 0,
                    "y": 11
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum(rate(http_requests_total{job=\"cwe-explorer\"}[1m])) by (endpoint, status)",
                        "legendFormat": "{{endpoint}} → {{status}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "palette-classic"
                        },
                        "custom": {
                            "lineWidth": 2,
                            "fillOpacity": 15,
                            "spanNulls": true,
                            "stacking": {
                                "mode": "none"
                            }
                        },
                        "unit": "reqps"
                    },
                    "overrides": []
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "bottom",
                        "calcs": [
                            "mean",
                            "max"
                        ]
                    }
                }
            },
            {
                "title": "Total Requests Over Time",
                "description": "Cumulative request count over time — shows how traffic accumulates.",
                "type": "timeseries",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 12,
                    "y": 11
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum(http_requests_total{job=\"cwe-explorer\"}) by (endpoint)",
                        "legendFormat": "{{endpoint}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "palette-classic"
                        },
                        "custom": {
                            "lineWidth": 2,
                            "fillOpacity": 10,
                            "stacking": {
                                "mode": "normal"
                            }
                        },
                        "unit": "short"
                    },
                    "overrides": []
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "bottom",
                        "calcs": [
                            "last"
                        ]
                    }
                }
            },
            {
                "title": "Requests by Endpoint",
                "description": "Pie chart showing which endpoints receive the most traffic.",
                "type": "piechart",
                "gridPos": {
                    "h": 8,
                    "w": 8,
                    "x": 0,
                    "y": 19
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum by (endpoint) (http_requests_total{job=\"cwe-explorer\"})",
                        "legendFormat": "{{endpoint}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {},
                    "overrides": []
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "right",
                        "values": [
                            "value",
                            "percent"
                        ]
                    }
                }
            },
            {
                "title": "Requests by HTTP Method",
                "description": "Breakdown of traffic by HTTP method (GET, POST, etc).",
                "type": "piechart",
                "gridPos": {
                    "h": 8,
                    "w": 8,
                    "x": 8,
                    "y": 19
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum by (method) (http_requests_total{job=\"cwe-explorer\"})",
                        "legendFormat": "{{method}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {},
                    "overrides": []
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "right",
                        "values": [
                            "value",
                            "percent"
                        ]
                    }
                }
            },
            {
                "title": "Requests by Status Code",
                "description": "Breakdown of all responses by HTTP status code (200, 404, 500, etc).",
                "type": "piechart",
                "gridPos": {
                    "h": 8,
                    "w": 8,
                    "x": 16,
                    "y": 19
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum by (status) (http_requests_total{job=\"cwe-explorer\"})",
                        "legendFormat": "HTTP {{status}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {},
                    "overrides": []
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "right",
                        "values": [
                            "value",
                            "percent"
                        ]
                    }
                }
            },
            {
                "title": "",
                "type": "text",
                "gridPos": {
                    "h": 2,
                    "w": 24,
                    "x": 0,
                    "y": 27
                },
                "options": {
                    "mode": "markdown",
                    "content": "# ⏱️ Latency"
                }
            },
            {
                "title": "Response Time — p50 / p95 / p99",
                "description": "How long requests take to complete. p50 = typical, p95 = slow, p99 = worst-case outliers.",
                "type": "timeseries",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 0,
                    "y": 29
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"cwe-explorer\"}[5m])) by (le))",
                        "legendFormat": "p50 (typical)",
                        "refId": "A"
                    },
                    {
                        "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"cwe-explorer\"}[5m])) by (le))",
                        "legendFormat": "p95 (slow)",
                        "refId": "B"
                    },
                    {
                        "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"cwe-explorer\"}[5m])) by (le))",
                        "legendFormat": "p99 (worst case)",
                        "refId": "C"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "palette-classic"
                        },
                        "custom": {
                            "lineWidth": 2,
                            "fillOpacity": 10
                        },
                        "unit": "s"
                    },
                    "overrides": [
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "p99 (worst case)"
                            },
                            "properties": [
                                {
                                    "id": "color",
                                    "value": {
                                        "fixedColor": "#F2495C",
                                        "mode": "fixed"
                                    }
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "p95 (slow)"
                            },
                            "properties": [
                                {
                                    "id": "color",
                                    "value": {
                                        "fixedColor": "#FF9830",
                                        "mode": "fixed"
                                    }
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "p50 (typical)"
                            },
                            "properties": [
                                {
                                    "id": "color",
                                    "value": {
                                        "fixedColor": "#73BF69",
                                        "mode": "fixed"
                                    }
                                }
                            ]
                        }
                    ]
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "bottom",
                        "calcs": [
                            "mean",
                            "max"
                        ]
                    }
                }
            },
            {
                "title": "Response Time by Endpoint (p95)",
                "description": "The p95 latency for each endpoint — shows which routes are slowest.",
                "type": "timeseries",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 12,
                    "y": 29
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"cwe-explorer\"}[5m])) by (le, endpoint))",
                        "legendFormat": "{{endpoint}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "palette-classic"
                        },
                        "custom": {
                            "lineWidth": 2,
                            "fillOpacity": 10
                        },
                        "unit": "s"
                    },
                    "overrides": []
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "bottom",
                        "calcs": [
                            "mean",
                            "max"
                        ]
                    }
                }
            },
            {
                "title": "Average Response Time per Endpoint",
                "description": "Bar gauge showing average response time for each endpoint — instantly spot the slowest routes.",
                "type": "bargauge",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 0,
                    "y": 37
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum(rate(http_request_duration_seconds_sum{job=\"cwe-explorer\"}[5m])) by (endpoint) / sum(rate(http_request_duration_seconds_count{job=\"cwe-explorer\"}[5m])) by (endpoint)",
                        "legendFormat": "{{endpoint}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "continuous-GrYlRd"
                        },
                        "unit": "s",
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": null
                                },
                                {
                                    "color": "yellow",
                                    "value": 0.5
                                },
                                {
                                    "color": "red",
                                    "value": 2.0
                                }
                            ]
                        }
                    },
                    "overrides": []
                },
                "options": {
                    "displayMode": "gradient",
                    "orientation": "horizontal",
                    "showUnfilled": true
                }
            },
            {
                "title": "Request Duration Heatmap",
                "description": "Heatmap of request durations — darker cells mean more requests in that latency bucket. Helps spot latency spikes.",
                "type": "heatmap",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 12,
                    "y": 37
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum(rate(http_request_duration_seconds_bucket{job=\"cwe-explorer\"}[5m])) by (le)",
                        "legendFormat": "{{le}}",
                        "refId": "A",
                        "format": "heatmap"
                    }
                ],
                "options": {
                    "calculate": false,
                    "color": {
                        "scheme": "Oranges"
                    },
                    "yAxis": {
                        "unit": "s"
                    }
                }
            },
            {
                "title": "",
                "type": "text",
                "gridPos": {
                    "h": 2,
                    "w": 24,
                    "x": 0,
                    "y": 45
                },
                "options": {
                    "mode": "markdown",
                    "content": "# 🔴 Errors & Active Connections"
                }
            },
            {
                "title": "Error Rate (5xx per second)",
                "description": "Rate of server errors over time. Any spike here means something is breaking.",
                "type": "timeseries",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 0,
                    "y": 47
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum(rate(http_requests_total{job=\"cwe-explorer\", status=~\"5..\"}[1m])) by (endpoint)",
                        "legendFormat": "{{endpoint}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "fixedColor": "#F2495C",
                            "mode": "fixed"
                        },
                        "custom": {
                            "lineWidth": 2,
                            "fillOpacity": 25
                        },
                        "unit": "reqps"
                    },
                    "overrides": []
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "bottom"
                    }
                }
            },
            {
                "title": "Requests Currently In Progress",
                "description": "How many requests are being handled right now. A sustained high number may indicate the API is overloaded.",
                "type": "timeseries",
                "gridPos": {
                    "h": 8,
                    "w": 12,
                    "x": 12,
                    "y": 47
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum(http_requests_in_progress{job=\"cwe-explorer\"}) by (endpoint)",
                        "legendFormat": "{{endpoint}}",
                        "refId": "A"
                    }
                ],
                "fieldConfig": {
                    "defaults": {
                        "color": {
                            "mode": "palette-classic"
                        },
                        "custom": {
                            "lineWidth": 2,
                            "fillOpacity": 20,
                            "stacking": {
                                "mode": "normal"
                            }
                        },
                        "unit": "short",
                        "thresholds": {
                            "steps": [
                                {
                                    "color": "green",
                                    "value": null
                                },
                                {
                                    "color": "yellow",
                                    "value": 10
                                },
                                {
                                    "color": "red",
                                    "value": 50
                                }
                            ]
                        }
                    },
                    "overrides": []
                },
                "options": {
                    "legend": {
                        "displayMode": "table",
                        "placement": "bottom",
                        "calcs": [
                            "mean",
                            "max"
                        ]
                    }
                }
            },
            {
                "title": "",
                "type": "text",
                "gridPos": {
                    "h": 2,
                    "w": 24,
                    "x": 0,
                    "y": 55
                },
                "options": {
                    "mode": "markdown",
                    "content": "# 📋 Request Log — All Endpoints"
                }
            },
            {
                "title": "All Requests — Full Breakdown Table",
                "description": "Every endpoint with its method, status code, total count, request rate, and average response time.",
                "type": "table",
                "gridPos": {
                    "h": 10,
                    "w": 24,
                    "x": 0,
                    "y": 57
                },
                "datasource": {
                    "type": "prometheus",
                    "uid": "prometheus"
                },
                "targets": [
                    {
                        "expr": "sum by (method, endpoint, status) (http_requests_total{job=\"cwe-explorer\"})",
                        "legendFormat": "",
                        "refId": "A",
                        "format": "table",
                        "instant": true
                    },
                    {
                        "expr": "sum by (method, endpoint, status) (rate(http_requests_total{job=\"cwe-explorer\"}[5m]))",
                        "legendFormat": "",
                        "refId": "B",
                        "format": "table",
                        "instant": true
                    },
                    {
                        "expr": "sum by (method, endpoint) (rate(http_request_duration_seconds_sum{job=\"cwe-explorer\"}[5m])) / sum by (method, endpoint) (rate(http_request_duration_seconds_count{job=\"cwe-explorer\"}[5m]))",
                        "legendFormat": "",
                        "refId": "C",
                        "format": "table",
                        "instant": true
                    }
                ],
                "transformations": [
                    {
                        "id": "merge",
                        "options": {}
                    },
                    {
                        "id": "organize",
                        "options": {
                            "excludeByName": {
                                "Time": true
                            },
                            "renameByName": {
                                "method": "Method",
                                "endpoint": "Endpoint",
                                "status": "Status",
                                "Value #A": "Total Requests",
                                "Value #B": "Req/s (5m avg)",
                                "Value #C": "Avg Response Time (s)"
                            },
                            "indexByName": {
                                "Method": 0,
                                "Endpoint": 1,
                                "Status": 2,
                                "Total Requests": 3,
                                "Req/s (5m avg)": 4,
                                "Avg Response Time (s)": 5
                            }
                        }
                    }
                ],
                "fieldConfig": {
                    "defaults": {},
                    "overrides": [
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Total Requests"
                            },
                            "properties": [
                                {
                                    "id": "unit",
                                    "value": "short"
                                },
                                {
                                    "id": "decimals",
                                    "value": 0
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Req/s (5m avg)"
                            },
                            "properties": [
                                {
                                    "id": "unit",
                                    "value": "reqps"
                                },
                                {
                                    "id": "decimals",
                                    "value": 2
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Avg Response Time (s)"
                            },
                            "properties": [
                                {
                                    "id": "unit",
                                    "value": "s"
                                },
                                {
                                    "id": "decimals",
                                    "value": 4
                                }
                            ]
                        },
                        {
                            "matcher": {
                                "id": "byName",
                                "options": "Status"
                            },
                            "properties": [
                                {
                                    "id": "mappings",
