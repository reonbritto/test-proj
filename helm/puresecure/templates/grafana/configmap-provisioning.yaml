{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.grafana.labels" . | nindent 4 }}
data:
  datasource.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:{{ .Values.prometheus.port }}
        isDefault: true
        editable: true

  dashboard.yml: |
    apiVersion: 1

    providers:
      - name: "CWE Explorer"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
{{- end }}
