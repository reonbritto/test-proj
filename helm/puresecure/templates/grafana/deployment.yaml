{{- if .Values.grafana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.grafana.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.grafana.replicas }}
  selector:
    matchLabels:
      {{- include "puresecure.grafana.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "puresecure.grafana.labels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: {{ .Values.grafana.securityContext.fsGroup }}
      initContainers:
        - name: fix-permissions
          image: {{ .Values.grafana.initImage }}
          command: ["sh", "-c", "chown -R 472:472 /var/lib/grafana && mkdir -p /var/lib/grafana/dashboards && mkdir -p /var/lib/grafana/plugins"]
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
      containers:
        - name: grafana
          image: {{ .Values.grafana.image }}
          ports:
            - name: http
              containerPort: {{ .Values.grafana.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: grafana-auth-config
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GF_ADMIN_PASSWORD
            - name: GF_AUTH_AZUREAD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: GF_AUTH_AZUREAD_CLIENT_SECRET
            - name: GF_PATHS_PLUGINS
              value: "/var/lib/grafana/plugins"
          volumeMounts:
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards/dashboard.yml
              subPath: dashboard.yml
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: dashboard-json
              mountPath: /var/lib/grafana/dashboards/cwe-explorer.json
              subPath: cwe-explorer.json
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: {{ .Values.grafana.resources.requests.cpu }}
              memory: {{ .Values.grafana.resources.requests.memory }}
            limits:
              cpu: {{ .Values.grafana.resources.limits.cpu }}
              memory: {{ .Values.grafana.resources.limits.memory }}
      volumes:
        - name: provisioning-datasources
          configMap:
            name: grafana-provisioning
            items:
              - key: datasource.yml
                path: datasource.yml
        - name: provisioning-dashboards
          configMap:
            name: grafana-provisioning
            items:
              - key: dashboard.yml
                path: dashboard.yml
        - name: dashboard-json
          configMap:
            name: grafana-dashboard
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data-pvc
{{- end }}
