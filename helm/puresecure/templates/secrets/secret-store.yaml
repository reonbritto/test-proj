{{- if .Values.externalSecrets.enabled }}
# -- Service Account for Workload Identity (Azure Key Vault access)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-service-account
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.labels" . | nindent 4 }}
  annotations:
    azure.workload.identity/client-id: {{ .Values.externalSecrets.managedIdentityClientId | quote }}
---
# -- SecretStore connecting to Azure Key Vault
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.externalSecrets.secretStoreName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.labels" . | nindent 4 }}
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: "https://{{ .Values.externalSecrets.keyVaultName }}.vault.azure.net"
      serviceAccountRef:
        name: eso-service-account
{{- end }}
