apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.app.name }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.app.replicas }}
  # Recreate (not RollingUpdate) because cwe-data-pvc is ReadWriteOnce and a
  # single PVC can't be attached to two pods at once. RollingUpdate would
  # deadlock: new pod stuck ContainerCreating waiting for the volume, old pod
  # never terminates because new pod isn't Ready.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "puresecure.app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "puresecure.app.labels" . | nindent 8 }}
      annotations:
        # Inject Envoy sidecar — opt-in per workload (we don't enable
        # namespace-wide injection because Prometheus/Grafana/Loki/etc.
        # don't need to be meshed and pay a 50 MiB/pod overhead).
        sidecar.istio.io/inject: "true"
        # Tracing destination is set by the namespace-level Telemetry
        # resource (helm/istio-mesh/templates/telemetry.yaml) which
        # references the "openobserve" provider registered on the
        # IstioOperator. No per-pod proxy.istio.io/config needed.
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.app.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.app.securityContext.runAsUser }}
        fsGroup: {{ .Values.app.securityContext.fsGroup }}
      containers:
        - name: {{ .Values.app.name }}
          image: "{{ .Values.app.image.repository }}:{{ .Values.app.image.tag }}"
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          volumeMounts:
            - name: cwe-data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: {{ .Values.app.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.app.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.app.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.app.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.app.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.app.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.app.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.app.probes.readiness.failureThreshold }}
          resources:
            requests:
              cpu: {{ .Values.app.resources.requests.cpu }}
              memory: {{ .Values.app.resources.requests.memory }}
            limits:
              cpu: {{ .Values.app.resources.limits.cpu }}
              memory: {{ .Values.app.resources.limits.memory }}
      volumes:
        - name: cwe-data
          persistentVolumeClaim:
            claimName: cwe-data-pvc
