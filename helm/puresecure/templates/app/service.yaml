apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "puresecure.app.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.app.port }}
      targetPort: {{ .Values.app.port }}
      protocol: TCP
