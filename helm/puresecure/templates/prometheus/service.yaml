{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.prometheus.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "puresecure.prometheus.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.prometheus.port }}
      targetPort: {{ .Values.prometheus.port }}
      protocol: TCP
{{- end }}
