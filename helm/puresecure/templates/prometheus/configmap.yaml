{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    # Additive: stream a copy of every scraped sample to OpenObserve.
    # Local Prometheus storage stays the source of truth for alerting
    # and Grafana panels; OpenObserve gets the same data for its own UI.
    remote_write:
      # OpenObserve's Prometheus remote_write endpoint is namespaced
      # under /api/<org>/prometheus/api/v1/write — no leading underscore
      # here (only the Loki-compat path needs it).
      - url: http://openobserve.openobserve.svc.cluster.local:5080/api/puresecure/prometheus/api/v1/write
        basic_auth:
          username: admin@reondev.top
          password: ChangeMe123!
        # Don't block scraping if OpenObserve is briefly down.
        queue_config:
          capacity: 2500
          max_shards: 5
          min_shards: 1
          max_samples_per_send: 500
        write_relabel_configs:
          # Drop noisy histogram bucket churn — keeps OO storage smaller.
          - source_labels: [__name__]
            regex: '.*_bucket'
            action: keep   # change to "drop" if Parquet size becomes a problem

    # Forward fired alerts to Alertmanager
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - "alertmanager:{{ .Values.alertmanager.port }}"

    rule_files:
      - /etc/prometheus/rules/recording_rules.yml
      - /etc/prometheus/rules/alerting_rules.yml

    scrape_configs:
      - job_name: "cwe-explorer"
        metrics_path: /metrics
        static_configs:
          - targets: ["web:{{ .Values.app.port }}"]
            labels:
              app: "cwe-explorer"
              environment: "production"

      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:{{ .Values.prometheus.port }}"]

      {{- if .Values.alertmanager.enabled }}
      - job_name: "alertmanager"
        static_configs:
          - targets: ["alertmanager:{{ .Values.alertmanager.port }}"]
      {{- end }}

      # Node-level OS metrics (CPU, memory, disk, network)
      - job_name: "node-exporter"
        static_configs:
          - targets: ["node-exporter:9100"]
            labels:
              environment: "production"

      # Kubernetes object metrics (pod status, resource requests/limits, restarts)
      - job_name: "kube-state-metrics"
        static_configs:
          - targets: ["kube-state-metrics:8080"]
            labels:
              environment: "production"

      # Redis cache metrics (memory, ops/s, hit rate, keyspace)
      - job_name: "redis"
        static_configs:
          - targets: ["redis-exporter:9121"]
            labels:
              environment: "production"

      # ─── Istio data-plane (Envoy sidecars) ─────────────────────
      # Source of istio_requests_total / istio_request_duration_milliseconds
      # — what Kiali needs to render the service graph.
      #
      # Discovers every pod and rewrites the target to its istio-proxy
      # metrics endpoint at :15090/stats/prometheus. We match on the
      # presence of the istio-proxy container by checking the annotation
      # the Istio mutating webhook adds (`sidecar.istio.io/status`),
      # which is more reliable across Istio versions than matching on
      # a port name.
      - job_name: "envoy-stats"
        metrics_path: /stats/prometheus
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Keep only pods that have been sidecar-injected.
          - source_labels: [__meta_kubernetes_pod_annotation_sidecar_istio_io_status]
            action: keep
            regex: ".+"
          # Drop pods that aren't running.
          - source_labels: [__meta_kubernetes_pod_phase]
            action: keep
            regex: Running
          # Replace the target's port with 15090 (Envoy's metrics port).
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:15090
            target_label: __address__
          # Surface useful pod labels into the metric.
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod_name

      # ─── Istio control plane (istiod) ─────────────────────────
      - job_name: "istiod"
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ["istio-system"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: 'istiod;http-monitoring'

  recording_rules.yml: |
    groups:
      - name: cwe_explorer_request_rates
        interval: 15s
        rules:
          - record: cwe:http_requests:rate1m
            expr: sum(rate(http_requests_total{job="cwe-explorer"}[1m]))
          - record: cwe:http_requests_by_endpoint:rate1m
            expr: sum by (endpoint) (rate(http_requests_total{job="cwe-explorer"}[1m]))
          - record: cwe:http_requests_by_status:rate1m
            expr: sum by (status) (rate(http_requests_total{job="cwe-explorer"}[1m]))
          - record: cwe:http_requests_detailed:rate5m
            expr: sum by (method, endpoint, status) (rate(http_requests_total{job="cwe-explorer"}[5m]))

      - name: cwe_explorer_error_rates
        interval: 15s
        rules:
          - record: cwe:http_errors_5xx:rate1m
            expr: sum(rate(http_requests_total{job="cwe-explorer", status=~"5.."}[1m]))
          - record: cwe:http_errors_4xx:rate1m
            expr: sum(rate(http_requests_total{job="cwe-explorer", status=~"4.."}[1m]))
          - record: cwe:http_error_ratio_5xx
            expr: >
              sum(rate(http_requests_total{job="cwe-explorer", status=~"5.."}[5m]))
              /
              sum(rate(http_requests_total{job="cwe-explorer"}[5m]))
          - record: cwe:http_error_ratio_4xx
            expr: >
              sum(rate(http_requests_total{job="cwe-explorer", status=~"4.."}[5m]))
              /
              sum(rate(http_requests_total{job="cwe-explorer"}[5m]))

      - name: cwe_explorer_latency
        interval: 15s
        rules:
          - record: cwe:http_latency_p50:5m
            expr: >
              histogram_quantile(0.50,
                sum by (le) (rate(http_request_duration_seconds_bucket{job="cwe-explorer"}[5m]))
              )
          - record: cwe:http_latency_p90:5m
            expr: >
              histogram_quantile(0.90,
                sum by (le) (rate(http_request_duration_seconds_bucket{job="cwe-explorer"}[5m]))
              )
          - record: cwe:http_latency_p95:5m
            expr: >
              histogram_quantile(0.95,
                sum by (le) (rate(http_request_duration_seconds_bucket{job="cwe-explorer"}[5m]))
              )
          - record: cwe:http_latency_p99:5m
            expr: >
              histogram_quantile(0.99,
                sum by (le) (rate(http_request_duration_seconds_bucket{job="cwe-explorer"}[5m]))
              )
          - record: cwe:http_latency_p95_by_endpoint:5m
            expr: >
              histogram_quantile(0.95,
                sum by (le, endpoint) (rate(http_request_duration_seconds_bucket{job="cwe-explorer"}[5m]))
              )
          - record: cwe:http_avg_duration_by_endpoint:5m
            expr: >
              sum by (endpoint) (rate(http_request_duration_seconds_sum{job="cwe-explorer"}[5m]))
              /
              sum by (endpoint) (rate(http_request_duration_seconds_count{job="cwe-explorer"}[5m]))

      - name: cwe_explorer_availability
        interval: 15s
        rules:
          - record: cwe:http_availability:5m
            expr: >
              1 - (
                sum(rate(http_requests_total{job="cwe-explorer", status=~"5.."}[5m]))
                /
                sum(rate(http_requests_total{job="cwe-explorer"}[5m]))
              )
          - record: cwe:http_in_progress:total
            expr: sum(http_requests_in_progress{job="cwe-explorer"})
          - record: cwe:http_in_progress_by_endpoint
            expr: sum by (endpoint) (http_requests_in_progress{job="cwe-explorer"})
          - record: cwe:http_requests:total
            expr: sum(http_requests_total{job="cwe-explorer"})
          - record: cwe:http_requests_by_endpoint:total
            expr: sum by (endpoint) (http_requests_total{job="cwe-explorer"})

      - name: infra_node
        interval: 15s
        rules:
          - record: infra:node_cpu_usage:percent5m
            expr: >
              (1 - avg by (instance) (
                rate(node_cpu_seconds_total{mode="idle",job="node-exporter"}[5m])
              )) * 100
          - record: infra:node_memory_usage:percent
            expr: >
              100 * (
                1 - (
                  node_memory_MemAvailable_bytes{job="node-exporter"}
                  / node_memory_MemTotal_bytes{job="node-exporter"}
                )
              )
          - record: infra:node_disk_usage:percent
            expr: >
              100 - (
                node_filesystem_avail_bytes{job="node-exporter",mountpoint="/",fstype!="tmpfs"}
                / node_filesystem_size_bytes{job="node-exporter",mountpoint="/",fstype!="tmpfs"}
                * 100
              )
          - record: infra:node_network_rx:rate5m
            expr: >
              sum by (instance) (
                rate(node_network_receive_bytes_total{job="node-exporter",device!~"lo|veth.*|docker.*|flannel.*|cali.*"}[5m])
              )
          - record: infra:node_network_tx:rate5m
            expr: >
              sum by (instance) (
                rate(node_network_transmit_bytes_total{job="node-exporter",device!~"lo|veth.*|docker.*|flannel.*|cali.*"}[5m])
              )

      - name: infra_kubernetes
        interval: 15s
        rules:
          - record: infra:pods_running:count
            expr: >
              count(
                kube_pod_status_phase{namespace="{{ .Values.namespace }}",phase="Running",job="kube-state-metrics"}
              )
          - record: infra:pods_not_running:count
            expr: >
              count(
                kube_pod_status_phase{namespace="{{ .Values.namespace }}",phase!="Running",phase!="Succeeded",job="kube-state-metrics"}
              ) or vector(0)
          - record: infra:container_restarts:rate1h
            expr: >
              sum by (pod, container) (
                increase(kube_pod_container_status_restarts_total{namespace="{{ .Values.namespace }}",job="kube-state-metrics"}[1h])
              )

      - name: infra_redis
        interval: 15s
        rules:
          - record: infra:redis_memory_usage:ratio
            expr: >
              redis_memory_used_bytes{job="redis"}
              / redis_memory_max_bytes{job="redis"}
          - record: infra:redis_hit_rate:5m
            expr: >
              rate(redis_keyspace_hits_total{job="redis"}[5m])
              / (
                rate(redis_keyspace_hits_total{job="redis"}[5m])
                + rate(redis_keyspace_misses_total{job="redis"}[5m])
              )
          - record: infra:redis_ops:rate1m
            expr: rate(redis_commands_processed_total{job="redis"}[1m])
          - record: infra:redis_evictions:rate5m
            expr: rate(redis_evicted_keys_total{job="redis"}[5m])

  alerting_rules.yml: |
    groups:
      - name: cwe_explorer_alerts
        rules:
          - alert: APIDown
            expr: up{job="cwe-explorer"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "CWE Explorer API is DOWN"
              description: "Prometheus cannot reach the /metrics endpoint on web:{{ .Values.app.port }}. The API has been unreachable for more than 2 minutes."
          - alert: HighServerErrorRate
            expr: cwe:http_error_ratio_5xx > 0.05
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Server error rate above 5%"
              description: "{{`{{ $value | humanizePercentage }}`}} of requests are returning 5xx errors over the last 5 minutes."
          - alert: HighClientErrorRate
            expr: cwe:http_error_ratio_4xx > 0.25
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Client error rate above 25%"
              description: "{{`{{ $value | humanizePercentage }}`}} of requests are returning 4xx errors."
          - alert: LowAvailability
            expr: cwe:http_availability:5m < 0.99
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "API availability below 99%"
              description: "Current availability is {{`{{ $value | humanizePercentage }}`}} over the last 5 minutes."

      - name: cwe_explorer_latency_alerts
        rules:
          - alert: HighP95Latency
            expr: cwe:http_latency_p95:5m > 1.0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "p95 latency above 1 second"
              description: "95th percentile response time is {{`{{ $value | humanizeDuration }}`}}."
          - alert: CriticalP95Latency
            expr: cwe:http_latency_p95:5m > 5.0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "p95 latency above 5 seconds"
              description: "95th percentile response time is {{`{{ $value | humanizeDuration }}`}}."
          - alert: HighP99Latency
            expr: cwe:http_latency_p99:5m > 3.0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "p99 latency above 3 seconds"
              description: "99th percentile response time is {{`{{ $value | humanizeDuration }}`}}."
          - alert: SlowEndpoint
            expr: cwe:http_latency_p95_by_endpoint:5m > 2.0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Endpoint {{`{{ $labels.endpoint }}`}} is slow"
              description: "p95 latency for {{`{{ $labels.endpoint }}`}} is {{`{{ $value | humanizeDuration }}`}}."

      - name: cwe_explorer_traffic_alerts
        rules:
          - alert: NoTraffic
            expr: cwe:http_requests:rate1m == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "No requests received for 10 minutes"
              description: "The API has not received any requests in the last 10 minutes."
          - alert: HighConcurrency
            expr: cwe:http_in_progress:total > 50
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "High number of concurrent requests ({{`{{ $value }}`}})"
              description: "There are {{`{{ $value }}`}} requests currently being processed."
          - alert: TrafficSpike
            expr: >
              cwe:http_requests:rate1m
              > 10 * avg_over_time(cwe:http_requests:rate1m[1h])
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Traffic spike detected (10x normal)"
              description: "Current request rate is {{`{{ $value | humanize }}`}} req/s, which is 10x higher than the 1-hour average."

      - name: infra_node_alerts
        rules:
          - alert: NodeHighCPU
            expr: infra:node_cpu_usage:percent5m > 80
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Node {{`{{ $labels.instance }}`}} CPU above 80%"
              description: "CPU on {{`{{ $labels.instance }}`}} is {{`{{ $value | humanize }}`}}% for over 10 minutes."
          - alert: NodeCriticalCPU
            expr: infra:node_cpu_usage:percent5m > 90
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{`{{ $labels.instance }}`}} CPU critically high ({{`{{ $value | humanize }}`}}%)"
              description: "CPU on {{`{{ $labels.instance }}`}} has been above 90% for 5 minutes. Workloads may be throttled."
          - alert: NodeHighMemory
            expr: infra:node_memory_usage:percent > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node {{`{{ $labels.instance }}`}} memory above 85%"
              description: "Memory on {{`{{ $labels.instance }}`}} is {{`{{ $value | humanize }}`}}%. OOMKill risk elevated."
          - alert: NodeCriticalMemory
            expr: infra:node_memory_usage:percent > 95
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node {{`{{ $labels.instance }}`}} memory critically high ({{`{{ $value | humanize }}`}}%)"
              description: "Memory on {{`{{ $labels.instance }}`}} is nearly exhausted. Pod evictions or OOMKills are imminent."
          - alert: NodeDiskSpaceWarning
            expr: infra:node_disk_usage:percent > 75
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Node {{`{{ $labels.instance }}`}} disk above 75%"
              description: "Root filesystem on {{`{{ $labels.instance }}`}} is {{`{{ $value | humanize }}`}}% full."
          - alert: NodeDiskSpaceCritical
            expr: infra:node_disk_usage:percent > 90
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node {{`{{ $labels.instance }}`}} disk critically full ({{`{{ $value | humanize }}`}}%)"
              description: "Root filesystem on {{`{{ $labels.instance }}`}} is nearly full. Pods may fail to write logs or data."
          - alert: NodeExporterDown
            expr: up{job="node-exporter"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "node-exporter on {{`{{ $labels.instance }}`}} is unreachable"
              description: "Prometheus cannot scrape node-exporter. Node metrics are unavailable."

      - name: infra_kubernetes_alerts
        rules:
          - alert: PodNotRunning
            expr: >
              kube_pod_status_phase{namespace="{{ .Values.namespace }}",phase!="Running",phase!="Succeeded",job="kube-state-metrics"} == 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod {{`{{ $labels.pod }}`}} is {{`{{ $labels.phase }}`}}"
              description: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} has been in {{`{{ $labels.phase }}`}} state for more than 5 minutes."
          - alert: PodFailed
            expr: >
              kube_pod_status_phase{namespace="{{ .Values.namespace }}",phase="Failed",job="kube-state-metrics"} == 1
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{`{{ $labels.pod }}`}} has Failed"
              description: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} is in Failed state. Check: kubectl describe pod {{`{{ $labels.pod }}`}} -n {{`{{ $labels.namespace }}`}}"
          - alert: ContainerFrequentRestarts
            expr: infra:container_restarts:rate1h > 3
            for: 0m
            labels:
              severity: warning
            annotations:
              summary: "Container {{`{{ $labels.container }}`}} in {{`{{ $labels.pod }}`}} restarting frequently"
              description: "Container {{`{{ $labels.container }}`}} has restarted {{`{{ $value | humanize }}`}} times in the last hour."
          - alert: KubeStateMetricsDown
            expr: up{job="kube-state-metrics"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "kube-state-metrics is unreachable"
              description: "Prometheus cannot scrape kube-state-metrics. Kubernetes object health metrics are unavailable."

      - name: infra_redis_alerts
        rules:
          - alert: RedisDown
            expr: up{job="redis"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Redis is unreachable"
              description: "The Redis exporter is down. The cache is unavailable — CVE caching and concurrent user enforcement are disabled."
          - alert: RedisHighMemory
            expr: infra:redis_memory_usage:ratio > 0.80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Redis memory above 80% of maxmemory"
              description: "Redis is using {{`{{ $value | humanizePercentage }}`}} of its memory limit. LRU eviction will begin soon."
          - alert: RedisCriticalMemory
            expr: infra:redis_memory_usage:ratio > 0.95
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Redis memory critically high ({{`{{ $value | humanizePercentage }}`}} of max)"
              description: "Redis is actively evicting cached CVE data. Increase maxmemory or reduce TTLs."
          - alert: RedisLowHitRate
            expr: infra:redis_hit_rate:5m < 0.80
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Redis cache hit rate below 80%"
              description: "Cache hit rate is {{`{{ $value | humanizePercentage }}`}}. Many requests are bypassing the cache."
          - alert: RedisEvicting
            expr: infra:redis_evictions:rate5m > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Redis is evicting keys due to memory pressure"
              description: "Redis is evicting {{`{{ $value | humanize }}`}} keys/s. Increase the memory limit."

      # ── PVC / Persistent Volume disk usage ─────────────────────────
      - name: infra_pvc_alerts
        rules:
          - alert: PrometheusPVCDiskWarning
            expr: |
              (
                node_filesystem_size_bytes{mountpoint="/prometheus"} -
                node_filesystem_avail_bytes{mountpoint="/prometheus"}
              ) / node_filesystem_size_bytes{mountpoint="/prometheus"} * 100 > 70
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Prometheus PVC disk above 70%"
              description: "Prometheus data volume is {{ `{{ $value | humanize }}` }}% full. Retention or scrape interval may need tuning."
          - alert: PrometheusPVCDiskCritical
            expr: |
              (
                node_filesystem_size_bytes{mountpoint="/prometheus"} -
                node_filesystem_avail_bytes{mountpoint="/prometheus"}
              ) / node_filesystem_size_bytes{mountpoint="/prometheus"} * 100 > 85
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Prometheus PVC disk critically full"
              description: "Prometheus data volume is {{ `{{ $value | humanize }}` }}% full. Prometheus will OOM or crash when the PVC fills."
          - alert: LokiPVCDiskWarning
            expr: |
              (
                node_filesystem_size_bytes{mountpoint="/loki"} -
                node_filesystem_avail_bytes{mountpoint="/loki"}
              ) / node_filesystem_size_bytes{mountpoint="/loki"} * 100 > 70
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Loki PVC disk above 70%"
              description: "Loki log storage is {{ `{{ $value | humanize }}` }}% full. Compactor may not be running or retention is too long."
          - alert: LokiPVCDiskCritical
            expr: |
              (
                node_filesystem_size_bytes{mountpoint="/loki"} -
                node_filesystem_avail_bytes{mountpoint="/loki"}
              ) / node_filesystem_size_bytes{mountpoint="/loki"} * 100 > 85
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Loki PVC disk critically full — logs will be lost"
              description: "Loki log storage is {{ `{{ $value | humanize }}` }}% full. New log writes will fail and Loki will crash."
{{- end }}
