{{- if .Values.loki.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.loki.labels" . | nindent 4 }}
data:
  loki.yaml: |
    auth_enabled: false

    server:
      http_listen_port: {{ .Values.loki.port }}

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h

    limits_config:
      retention_period: {{ .Values.loki.retention }}
      # Hard cap on ingestion rate — prevents a noisy pod from filling the PVC
      ingestion_rate_mb: 4
      ingestion_burst_size_mb: 8

    compactor:
      working_directory: /loki/compactor
      # delete_request_store is required for retention enforcement — without it
      # retention_enabled has no effect and chunks are never deleted
      delete_request_store: filesystem
      retention_enabled: true
      # Run compaction every 2 hours so old chunks are purged regularly
      compaction_interval: 2h
      # Allow deletion API (used by compactor to remove expired chunks)
      retention_delete_delay: 2h
      retention_delete_worker_count: 1
{{- end }}
