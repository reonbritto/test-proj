{{- if .Values.locust.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: locust
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "puresecure.locust.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "puresecure.locust.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.locust.port }}
      targetPort: {{ .Values.locust.port }}
      protocol: TCP
{{- end }}
