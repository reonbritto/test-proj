# -- Security headers middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: security-headers
  namespace: {{ .Values.namespace }}
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    # X-Frame-Options intentionally omitted: CSP "frame-ancestors 'none'" (below)
    # is the modern replacement and strictly stronger. Having both creates a
    # configuration conflict (frameDeny=DENY vs customFrameOptionsValue=SAMEORIGIN)
    # and ambiguous fallback for legacy clients.
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
    referrerPolicy: "strict-origin-when-cross-origin"
    accessControlAllowOriginList:
      - "https://reondev.top"
    accessControlAllowHeaders:
      - "Authorization"
      - "Content-Type"
    accessControlAllowMethods:
      - "GET"
    accessControlMaxAge: 86400
    contentSecurityPolicy: >-
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob:;
      connect-src 'self' https://login.microsoftonline.com https://*.microsoftonline.com https://login.live.com https://graph.microsoft.com;
      frame-src https://login.microsoftonline.com https://*.microsoftonline.com https://login.live.com;
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self' https://login.microsoftonline.com https://*.microsoftonline.com https://login.live.com;
      object-src 'none';
      upgrade-insecure-requests
    customResponseHeaders:
      Server: ""
---
# -- Grafana security headers (looser CSP — Grafana ships inline scripts/styles
#    and uses eval() in some panel chunks; the strict CSP above breaks it).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: grafana-security-headers
  namespace: {{ .Values.namespace }}
spec:
  headers:
    browserXssFilter: true
    contentTypeNosniff: true
    stsIncludeSubdomains: true
    stsPreload: true
    stsSeconds: 31536000
    referrerPolicy: "strict-origin-when-cross-origin"
    contentSecurityPolicy: >-
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob:;
      connect-src 'self';
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
      object-src 'none';
      upgrade-insecure-requests
    customResponseHeaders:
      Server: ""
---
# -- HTTPS redirect middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: {{ .Values.namespace }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# -- Rate limiting middleware
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: {{ .Values.namespace }}
spec:
  rateLimit:
    average: {{ .Values.ingress.rateLimit.average }}
    burst: {{ .Values.ingress.rateLimit.burst }}
    period: {{ .Values.ingress.rateLimit.period }}
