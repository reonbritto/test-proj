# -- HTTP -> HTTPS redirect
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web-http-redirect
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - web
  routes:
    - match: >-
        Host(`{{ .Values.ingress.hosts.app }}`) ||
        Host(`{{ .Values.ingress.hosts.grafana }}`)
        {{- with .Values.ingress.hosts.kiali }} || Host(`{{ . }}`){{- end }}
      kind: Rule
      middlewares:
        - name: redirect-https
      services:
        - name: web
          port: {{ .Values.app.port }}
---
# -- Main app: {{ .Values.ingress.hosts.app }} (HTTPS)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: web-https
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.hosts.app }}`)
      kind: Rule
      middlewares:
        - name: security-headers
        - name: rate-limit
      services:
        - name: web
          port: {{ .Values.app.port }}
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
---
{{- with .Values.ingress.hosts.kiali }}
# -- Kiali: {{ . }} (HTTPS) — cross-namespace to istio-system.
# REQUIRES Traefik installed with:
#   --providers.kubernetescrd.allowCrossNamespace=true
# If your Traefik install doesn't have that flag, this route returns 503.
# Either patch Traefik (helm upgrade with the flag) OR access Kiali via:
#   kubectl port-forward -n istio-system svc/kiali 20001:20001
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kiali-https
  namespace: {{ $.Values.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ . }}`)
      kind: Rule
      middlewares:
        - name: grafana-security-headers   # same loose CSP — Kiali also uses inline scripts
      services:
        - name: kiali
          namespace: istio-system
          port: 20001
  tls:
    secretName: {{ $.Values.ingress.tlsSecretName }}
---
{{- end }}
# -- Grafana: {{ .Values.ingress.hosts.grafana }} (HTTPS)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-https
  namespace: {{ .Values.namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.ingress.hosts.grafana }}`)
      kind: Rule
      middlewares:
        - name: grafana-security-headers
      services:
        - name: grafana
          port: {{ .Values.grafana.port }}
  tls:
    secretName: {{ .Values.ingress.tlsSecretName }}
