{{- if .Values.ingress.enabled }}
{{- if .Values.ingress.basicAuth.enabled }}
# ─────────────────────────────────────────────────────────
#  Kiali basic-auth credentials (htpasswd format)
#
#  Bcrypt hash committed to git is acceptable for a personal /
#  coursework cluster — it's one-way and slow to brute-force. For
#  a real deployment, move this to Azure Key Vault and sync via ESO,
#  same pattern as app-secrets.
# ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: kiali-basic-auth
  namespace: {{ .Values.namespace }}
  labels:
    app: kiali
type: Opaque
stringData:
  # Format: <user>:<bcrypt-hash>
  # Generated with: docker run --rm httpd:2.4-alpine htpasswd -nbB admin 'reon9535'
  users: |
    {{ .Values.ingress.basicAuth.htpasswd | trim }}
{{- end }}
{{- end }}
