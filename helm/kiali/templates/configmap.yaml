apiVersion: v1
kind: ConfigMap
metadata:
  name: kiali
  namespace: {{ .Values.namespace }}
  labels:
    app: kiali
    app.kubernetes.io/name: kiali
data:
  config.yaml: |
    # ── Identity ──────────────────────────────────────────
    istio_namespace: {{ .Values.namespace }}
    deployment:
      view_only_mode: false       # allow Apply/Delete from the UI
      # We expose Kiali behind Traefik at https://kiali.reondev.top
      # so the UI links resolve correctly.
      ingress:
        enabled: false            # IngressRoute lives in puresecure chart, not here

    # ── Authentication ────────────────────────────────────
    auth:
      strategy: {{ .Values.auth.strategy }}

    # ── Where data comes from ─────────────────────────────
    external_services:
      prometheus:
        url: {{ .Values.externalServices.prometheus.url | quote }}
      grafana:
        enabled: true
        # Kiali v1.85: 'url' is the single field for the Grafana endpoint
        # Kiali itself queries (internal). 'external_url' is what gets
        # opened in the user's browser when they click a Grafana link.
        url: "http://grafana.puresecure.svc.cluster.local:3000"
        external_url: "https://grafana.reondev.top"
        # Grafana login uses the admin password from app-secrets (synced
        # from Azure Key Vault). Kiali is read-only against Grafana, so
        # no auth block is required for the dashboard-URL lookup.
        in_cluster_url: "http://grafana.puresecure.svc.cluster.local:3000"
      tracing:
        # Disabled — Kiali v1.85 expects a Jaeger query API at
        # http://tracing.istio-system:16686 (or similar) and OpenObserve's
        # compat surface doesn't satisfy that interface cleanly. Trace
        # search lives in the OpenObserve UI; Kiali workload pages will
        # not have a Traces tab. Re-enable when you add a real Jaeger
        # query gateway in front of OO.
        enabled: false
      istio:
        root_namespace: {{ .Values.externalServices.istio.rootNamespace | quote }}

    # ── Cluster identity ──────────────────────────────────
    kiali_feature_flags:
      disabled_features: []
    kubernetes_config:
      cache_token_namespace_duration: 10
      cluster_name: {{ .Values.cluster.name | quote }}

    # ── Server runtime ────────────────────────────────────
    server:
      port: {{ .Values.kiali.port }}
      web_root: /
      # Disabled — Kiali can otherwise show a banner in iframes
      cors_allow_all: false
