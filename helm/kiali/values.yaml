# ─────────────────────────────────────────────────────────
#  Kiali — values
# ─────────────────────────────────────────────────────────
# Service-graph + mesh console for Istio. Reads from:
#   - Prometheus (metrics)               → in-namespace Service
#   - Jaeger/Zipkin/OTLP-compat (traces) → optional
#   - Kubernetes API                     → ClusterRole below
# ─────────────────────────────────────────────────────────

namespace: istio-system   # Kiali lives next to istiod by convention

kiali:
  image: quay.io/kiali/kiali:v1.85
  replicas: 1
  port: 20001
  resources:
    requests: { cpu: 100m, memory: 192Mi }
    limits:   { cpu: 500m, memory: 512Mi }

# Where Kiali reads its data
externalServices:
  prometheus:
    url: "http://prometheus.puresecure.svc.cluster.local:9090"
  istio:
    rootNamespace: istio-system

# Auth — for a personal/coursework cluster, anonymous is fine.
# Production: switch to "openid" or "header" with a real IdP.
auth:
  strategy: anonymous

# Cluster identity — must match the cluster name Istio sidecars stamp
# on metrics. Default install reports "Kubernetes" in destination_cluster.
# Override on istioctl install with `--set values.global.multiCluster.clusterName=...`
# if you want a custom name. We use the default so Kiali queries match.
cluster:
  name: Kubernetes
  network: default

# ─── Public ingress (optional) ───────────────────────────
# When enabled, this chart ships a Certificate, Middleware, and
# IngressRoute all inside istio-system so Traefik routes the host
# without needing allowCrossNamespace. ExternalDNS will create the
# A record from the IngressRoute Host rule.
ingress:
  enabled: true
  host: kiali.reondev.top
  tlsSecretName: kiali-reondev-top-tls
  certIssuerName: letsencrypt-prod   # must already exist as a ClusterIssuer

  # Edge-level basic auth via Traefik. Kiali itself stays on auth.strategy
  # 'anonymous' — Traefik prompts for credentials and only forwards
  # authenticated requests upstream.
  basicAuth:
    enabled: true
    # admin / reon9535
    htpasswd: 'admin:$2y$05$x2.0psKqlZVCMJKZOnLCZegt2WF.jeFN8VH.wg/Q.l9/be8RLzYlq'
