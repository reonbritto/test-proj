# Bootstrap credentials for the OpenObserve root user.
# stringData lets us write the value verbatim; Kubernetes base64-encodes
# it on storage. To rotate: edit values.yaml + commit, ArgoCD applies,
# then delete the OpenObserve pod so it picks up the new env vars.
apiVersion: v1
kind: Secret
metadata:
  name: openobserve-bootstrap
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: openobserve
type: Opaque
stringData:
  ZO_ROOT_USER_EMAIL: {{ .Values.openobserve.rootUser.email | quote }}
  ZO_ROOT_USER_PASSWORD: {{ .Values.openobserve.rootUser.password | quote }}
