<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - PureSecure CWE Explorer</title>
    <link rel="stylesheet" href="/style.css?v=3">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 2rem;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            padding: 3rem 2.5rem;
            max-width: 460px;
            width: 100%;
            text-align: center;
        }

        .login-card .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--green-dim);
            margin-bottom: 1.5rem;
        }

        .login-card .logo-icon svg {
            stroke: var(--green-dark);
        }

        .login-card h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .login-card>p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .btn-microsoft {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            background: var(--green-dark);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            font-family: var(--font);
        }

        .btn-microsoft:hover {
            background: #047857;
        }

        .btn-microsoft svg {
            flex-shrink: 0;
        }

        .login-footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* ── Info Box ─────────────────────────────────────── */
        .info-box {
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1rem 1.25rem;
            margin-top: 1.5rem;
            text-align: left;
        }

        .info-box .box-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .info-box .box-text {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .info-box.info-note {
            border-left: 3px solid var(--green-dark);
        }
    </style>
</head>

<body>
    <header class="navbar">
        <a href="/login.html" class="logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            PureSecure <span>CWE Explorer</span>
        </a>
    </header>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                </svg>
            </div>
            <h1>Welcome</h1>
            <p>Sign in with your Microsoft account to access the CWE weakness database.</p>
            <button class="btn-microsoft" id="loginBtn" onclick="doLogin()">
                <svg width="20" height="20" viewBox="0 0 21 21" fill="none">
                    <rect x="1" y="1" width="9" height="9" fill="#f25022" />
                    <rect x="11" y="1" width="9" height="9" fill="#7fba00" />
                    <rect x="1" y="11" width="9" height="9" fill="#00a4ef" />
                    <rect x="11" y="11" width="9" height="9" fill="#ffb900" />
                </svg>
                Sign in with Microsoft
            </button>

            <!-- Info box -->
            <div class="info-box info-note">
                <div class="box-label">How to sign in</div>
                <div class="box-text">
                    Use your <strong>personal Microsoft account</strong> or
                    <a href="https://signup.live.com" target="_blank" rel="noopener noreferrer">create one</a>
                    to log in. Any Microsoft account (Outlook, Hotmail, Live) will work.
                </div>
            </div>


            <div class="login-footer">
                Protected by Microsoft Entra ID
            </div>
        </div>
    </div>

    <script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>
    <script src="/auth.js?v=3"></script>
    <script>
        /* ── MSAL login ───────────────────────────────────── */
        async function doLogin() {
            const ok = await initAuth();
            if (!ok) {
                alert("Authentication is not configured. Contact your administrator.");
                return;
            }
            await getToken();
        }

        // If already authenticated, go to homepage
        (async () => {
            const ok = await initAuth();
            if (ok) {
                const user = getCurrentUser();
                if (user) {
                    window.location.href = "/";
                }
            }
        })();
    </script>
</body>

</html>
