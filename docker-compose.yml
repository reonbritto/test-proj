services:
  # ── FastAPI Application ──────────────────────────────────
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - cwe-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - GRAFANA_URL=http://localhost:3000
      - PROMETHEUS_URL=http://localhost:9090
      - LOCUST_URL=http://localhost:8089
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      - web
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=true
      - GF_USERS_AUTO_ASSIGN_ORG=true
      - GF_USERS_AUTO_ASSIGN_ORG_ROLE=Viewer
      # ── Azure AD OAuth (Microsoft login) ──
      - GF_AUTH_AZUREAD_ENABLED=${GF_AUTH_AZUREAD_ENABLED:-false}
      - GF_AUTH_AZUREAD_NAME=Microsoft
      - GF_AUTH_AZUREAD_ALLOW_SIGN_UP=true
      - GF_AUTH_AZUREAD_AUTO_LOGIN=false
      - GF_AUTH_AZUREAD_CLIENT_ID=${AZURE_CLIENT_ID}
      - GF_AUTH_AZUREAD_CLIENT_SECRET=${GF_AUTH_AZUREAD_CLIENT_SECRET:-}
      - GF_AUTH_AZUREAD_SCOPES=openid profile email User.Read
      - GF_AUTH_AZUREAD_AUTH_URL=https://login.microsoftonline.com/common/oauth2/v2.0/authorize
      - GF_AUTH_AZUREAD_TOKEN_URL=https://login.microsoftonline.com/common/oauth2/v2.0/token
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_DOMAIN=localhost
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Locust (Load Testing UI) ─────────────────────────────
  locust:
    image: locustio/locust:2.24.1
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust:ro
    depends_on:
      - web
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY}
    command: -f /mnt/locust/locustfile.py --host=http://web:8000
    restart: unless-stopped

volumes:
  cwe-data:
  prometheus-data:
  grafana-data:
