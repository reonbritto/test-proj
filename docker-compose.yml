services:
  # ── Redis (Cache + Concurrent User Tracking) ────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── FastAPI Application ──────────────────────────────────
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./frontend/dist:/app/backend/static:ro
      - ./data:/app/data
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      - PYTHONUNBUFFERED=1
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - MAX_CONCURRENT_USERS=${MAX_CONCURRENT_USERS:-3}
      - USER_SESSION_TTL=${USER_SESSION_TTL:-1800}
      - GRAFANA_URL=http://localhost:3000
      - ARGOCD_URL=http://localhost:8080
      - PROMETHEUS_URL=http://localhost:9090
      - LOCUST_URL=http://localhost:8089
      - ALERTMANAGER_URL=http://localhost:9093
      - LOKI_URL=http://loki:3100
      - REDIS_EXPORTER_URL=http://redis-exporter:9121
      - KUBE_STATE_METRICS_URL=http://localhost:8080
      - NODE_EXPORTER_URL=http://localhost:9100
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Redis Exporter (exposes Redis metrics to Prometheus) ─
  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      - web
      - alertmanager
      - redis-exporter
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # ── Alertmanager ─────────────────────────────────────────
  # Uses envsubst to substitute ALERTMANAGER_SMTP_USERNAME / _PASSWORD into the
  # config template before starting, so secrets never sit in the config file.
  alertmanager:
    image: prom/alertmanager:v0.28.1
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - ./monitoring/alertmanager/templates:/etc/alertmanager/templates:ro
      - alertmanager-data:/alertmanager
    environment:
      - ALERTMANAGER_SMTP_USERNAME=${ALERTMANAGER_SMTP_USERNAME}
      - ALERTMANAGER_SMTP_PASSWORD=${ALERTMANAGER_SMTP_PASSWORD}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        sed
        -e "s/\$${ALERTMANAGER_SMTP_USERNAME}/$$ALERTMANAGER_SMTP_USERNAME/g"
        -e "s/\$${ALERTMANAGER_SMTP_PASSWORD}/$$ALERTMANAGER_SMTP_PASSWORD/g"
        /etc/alertmanager/alertmanager.yml.tmpl
        > /tmp/alertmanager-resolved.yml
        && exec /bin/alertmanager
        --config.file=/tmp/alertmanager-resolved.yml
        --storage.path=/alertmanager
        --web.external-url=http://localhost:9093
    restart: unless-stopped

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_AZUREAD_ENABLED=false
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_SERVER_DOMAIN=localhost
    depends_on:
      - prometheus
    restart: unless-stopped

  # ── Loki (Log Aggregation) ────────────────────────────────
  loki:
    image: grafana/loki:2.9.6
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    command: ["-config.file=/etc/loki/loki.yaml"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Promtail (Log Shipper) ──────────────────────────────
  promtail:
    image: grafana/promtail:2.9.6
    volumes:
      - ./monitoring/promtail/promtail.yaml:/etc/promtail/promtail.yaml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["-config.file=/etc/promtail/promtail.yaml"]
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ── Locust (Load Testing UI) ─────────────────────────────
  locust:
    image: locustio/locust:2.24.1
    ports:
      - "8089:8089"
    volumes:
      - ./locust:/mnt/locust:ro
    depends_on:
      - web
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY}
    command: -f /mnt/locust/locustfile.py --host=http://web:8000
    restart: unless-stopped

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  loki-data:
