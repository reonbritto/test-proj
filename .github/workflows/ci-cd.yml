name: PureSecure CI/CD Pipeline

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'helm/puresecure/values.yaml'
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────
  # Stage 1: Code Quality & Linting
  # ──────────────────────────────────────────────
  lint:
    name: Lint (Flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Flake8 linting
        run: flake8 app/ tests/ --max-line-length=100 --output-file=flake8-report.txt --tee

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: flake8-report.txt

  # ──────────────────────────────────────────────
  # Stage 2: SAST - Static Application Security Testing
  # ──────────────────────────────────────────────
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  # ──────────────────────────────────────────────
  # Stage 3: SCA - Software Composition Analysis
  # ──────────────────────────────────────────────
  sca:
    name: SCA (Snyk)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --file=requirements.txt
        continue-on-error: true

      - name: Run Snyk to generate SARIF
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk-report.sarif --file=requirements.txt
        continue-on-error: true

      - name: Upload Snyk SARIF report
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-report.sarif
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Stage 4: Secret Scanning
  # ──────────────────────────────────────────────
  secrets:
    name: Secrets (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ──────────────────────────────────────────────
  # Stage 5: SBOM - Software Bill of Materials
  # ──────────────────────────────────────────────
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generate CycloneDX SBOM (JSON)
        run: cyclonedx-py environment -o sbom.json --of json

      - name: Generate CycloneDX SBOM (XML)
        run: cyclonedx-py environment -o sbom.xml --of xml

      - name: Display SBOM summary
        run: |
          echo "=== SBOM Generated ==="
          echo "Format: CycloneDX"
          python -c "
          import json, os
          if os.path.exists('sbom.json'):
              with open('sbom.json') as f:
                  sbom = json.load(f)
              components = sbom.get('components', [])
              print(f'Total components: {len(components)}')
              for c in components:
                  name = c.get('name', 'unknown')
                  version = c.get('version', '?')
                  print(f'  - {name}@{version}')
          else:
              print('SBOM JSON not found, checking XML...')
          "

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            sbom.json
            sbom.xml

  # ──────────────────────────────────────────────
  # Stage 6: Unit & Integration Tests
  # ──────────────────────────────────────────────
  test:
    name: Tests (Pytest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Pytest with coverage
        run: |
          pytest tests/ -v --tb=short \
            --cov=app --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-html \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-html/

  # ──────────────────────────────────────────────
  # Stage 7: Docker Build
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, sast, sca, secrets, sbom, test]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/puresecure-cwe-explorer
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and save Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/docker-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/docker-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────
  # Stage 8: Trivy Container Scan
  # ──────────────────────────────────────────────
  trivy-scan:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: [docker-build]
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Trivy image scan (table — OS + app)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/puresecure-cwe-explorer:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          output: trivy-report.txt

      - name: Trivy image scan (SARIF — app dependencies only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/puresecure-cwe-explorer:latest
          format: sarif
          exit-code: '0'
          severity: CRITICAL,HIGH
          output: trivy-results.sarif
          vuln-type: library

      - name: Upload Trivy SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: container-scanning

      - name: Upload Trivy scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: |
            trivy-report.txt
            trivy-results.sarif

  # ──────────────────────────────────────────────
  # Stage 9: Docker Push to DockerHub
  # ──────────────────────────────────────────────
  docker-push:
    name: Docker Push
    runs-on: ubuntu-latest
    needs: [trivy-scan]
    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/docker-image.tar

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker images --format '{{.Repository}}:{{.Tag}}' | grep puresecure-cwe-explorer | while read tag; do
            docker push "$tag"
          done

  # ──────────────────────────────────────────────
  # Stage 10: Update Helm Values (GitOps trigger)
  # ──────────────────────────────────────────────
  update-manifest:
    name: Update Image Tag
    runs-on: ubuntu-latest
    needs: [docker-push]
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag in Helm values
        run: |
          yq -i '.app.image.tag = "${{ steps.sha.outputs.short }}"' helm/puresecure/values.yaml
          echo "Updated image tag to: ${{ steps.sha.outputs.short }}"
          cat helm/puresecure/values.yaml | head -20

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/puresecure/values.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update image tag to ${{ steps.sha.outputs.short }} [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push
